<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado Completo – Professor ETEC / CEETEPS</title>
<style>
  :root {
    --azul: #1a4fa0;
    --azul2: #2d6fce;
    --verde: #1a8a50;
    --verm: #c0392b;
    --cinza: #f4f6fa;
    --borda: #dce3f0;
    --texto: #1c2536;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--cinza); color: var(--texto); }

  header { background: var(--azul); color: white; padding: 24px 28px 16px; text-align: center; }
  header h1 { font-size: 1.5rem; }
  header p  { margin-top: 5px; font-size: 0.88rem; opacity: .85; }
  #barra-wrap { background: rgba(255,255,255,.2); border-radius:4px; height:7px; margin:14px auto 0; max-width:600px; }
  #barra-fill  { background:#7ec8e3; height:7px; border-radius:4px; width:0%; transition:width .4s; }

  /* abas */
  #abas { display:flex; flex-wrap:wrap; gap:5px; padding:14px 20px 0; background:white; border-bottom:1px solid var(--borda); position:sticky; top:0; z-index:10; }
  .aba { padding:6px 13px; border-radius:20px; border:2px solid var(--borda); cursor:pointer; font-size:.78rem; font-weight:700; background:white; color:#555; transition:all .2s; }
  .aba:hover, .aba.ativo { background:var(--azul); color:white; border-color:var(--azul); }

  /* badge de sub-fonte */
  .badge-real { font-size:.7rem; background:#fff3cd; color:#856404; border:1px solid #ffc107; padding:2px 7px; border-radius:10px; font-weight:600; }

  main { max-width:880px; margin:24px auto; padding:0 14px 80px; }

  .questao { background:white; border-radius:10px; border:1px solid var(--borda); margin-bottom:20px; padding:20px 24px; display:none; }
  .questao.visivel { display:block; }
  .questao:hover { box-shadow:0 3px 14px rgba(0,0,0,.06); }

  .qh { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .num { background:var(--azul); color:white; border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:.8rem; flex-shrink:0; }
  .tag { font-size:.72rem; background:#e8eef8; color:var(--azul); padding:3px 9px; border-radius:11px; font-weight:700; }

  .enunciado { font-size:.94rem; line-height:1.6; margin-bottom:14px; white-space:pre-wrap; }

  .alternativas { list-style:none; }
  .alternativas li { margin-bottom:8px; }
  .alternativas label { display:flex; align-items:flex-start; gap:9px; cursor:pointer; padding:8px 11px; border-radius:7px; border:2px solid var(--borda); font-size:.89rem; line-height:1.4; transition:all .15s; }
  .alternativas label:hover { border-color:var(--azul2); background:#f0f5ff; }
  .alternativas input[type=radio] { margin-top:2px; flex-shrink:0; }
  .alternativas label.correta { background:#e6f9ef; border-color:var(--verde); color:#145c34; }
  .alternativas label.errada  { background:#fdecea; border-color:var(--verm);  color:#7a1c14; }

  .btn-conf { margin-top:11px; padding:8px 20px; background:var(--azul); color:white; border:none; border-radius:7px; cursor:pointer; font-size:.88rem; font-weight:700; transition:background .2s; }
  .btn-conf:hover { background:var(--azul2); }
  .btn-conf:disabled { background:#aaa; cursor:default; }

  .feedback { margin-top:9px; padding:10px 13px; border-radius:7px; font-size:.87rem; display:none; line-height:1.5; }
  .feedback.ok  { background:#e6f9ef; color:#145c34; border-left:4px solid var(--verde); }
  .feedback.err { background:#fdecea; color:#7a1c14; border-left:4px solid var(--verm); }

  #resultado { display:none; background:white; border-radius:12px; border:2px solid var(--azul); padding:30px; text-align:center; margin-top:26px; }
  #resultado h2 { font-size:1.4rem; color:var(--azul); margin-bottom:8px; }
  .placar-num { font-size:2.8rem; font-weight:bold; color:var(--azul); }
  #resultado p { color:#555; margin-top:7px; }
  #btn-rei { margin-top:18px; padding:10px 28px; background:var(--azul); color:white; border:none; border-radius:8px; font-size:.95rem; cursor:pointer; font-weight:700; }

  #placar-float { position:fixed; bottom:16px; right:16px; background:var(--azul); color:white; border-radius:22px; padding:9px 18px; font-weight:bold; font-size:.85rem; box-shadow:0 4px 12px rgba(0,0,0,.2); z-index:100; }

  .stats-bar { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
  .stat-box { background:white; border:1px solid var(--borda); border-radius:9px; padding:10px 16px; flex:1; min-width:120px; text-align:center; }
  .stat-box .val { font-size:1.5rem; font-weight:bold; color:var(--azul); }
  .stat-box .lbl { font-size:.74rem; color:#666; margin-top:2px; }
</style>
</head>
<body>

<header>
  <h1>📚 Simulado Completo – Professor ETEC / CEETEPS</h1>
  <p>120 questões · Estilo real da banca · Questões de provas anteriores incluídas</p>
  <div id="barra-wrap"><div id="barra-fill"></div></div>
</header>

<div id="abas">
  <button class="aba ativo" onclick="filtrar('todas',this)">Todas (260)</button>
  <button class="aba" onclick="filtrar('informatica',this)">🖥️ Informática</button>
  <button class="aba" onclick="filtrar('pc',this)">🧠 Pens. Computacional</button>
  <button class="aba" onclick="filtrar('ia',this)">🤖 Int. Artificial</button>
  <button class="aba" onclick="filtrar('legislacao',this)">📜 Legislação</button>
  <button class="aba" onclick="filtrar('adm',this)">🏛️ Adm. Pública</button>
  <button class="aba" onclick="filtrar('lai',this)">🔓 Lei Acesso à Info.</button>
</div>

<main id="main">
  <div class="stats-bar" id="stats-bar">
    <div class="stat-box"><div class="val" id="s-total">194</div><div class="lbl">Total de questões</div></div>
    <div class="stat-box"><div class="val" id="s-resp">0</div><div class="lbl">Respondidas</div></div>
    <div class="stat-box"><div class="val" id="s-ac">0</div><div class="lbl">Acertos</div></div>
    <div class="stat-box"><div class="val" id="s-pct">0%</div><div class="lbl">Aproveitamento</div></div>
  </div>
</main>

<div id="placar-float">✅ <span id="ac-f">0</span> acertos · <span id="re-f">0</span> respondidas</div>

<div id="resultado" style="max-width:880px;margin:0 auto 40px;">
  <h2>🎉 Simulado Concluído!</h2>
  <div class="placar-num" id="pf"></div>
  <p id="msg-r"></p>
  <button id="btn-rei" onclick="reiniciar()">↺ Refazer Simulado</button>
</div>

<script>
/* ───── BANCO DE QUESTÕES ───── */
const Q = [

/* ══════════════════════════════════════════════════════
   BLOCO 1 – INFORMÁTICA / WINDOWS / WORD / EXCEL / PPOINT
   ══════════════════════════════════════════════════════ */

// ── questões extraídas das provas reais ──
{cat:'informatica', src:'real',
 e:'(EXCEL – Prova CEETEPS 2022) Em uma planilha do Microsoft Excel 2016, é necessário criar uma busca que, ao informar o código do funcionário, retorne seu nome e telefone. Considerando que o código está em B1 e a tabela de dados está no intervalo A7:C11 (col.1=código, col.2=nome, col.3=telefone), qual fórmula deve ser inserida em B2 (nome) e B3 (telefone)?',
 a:['B2 =PROCH(B1;A7:C11;2;FALSO) e B3 =PROCH(B1;A7:C11;3;FALSO)',
    'B2 =ÍNDICE(A7:C11;B1;2) e B3 =ÍNDICE(A7:C11;B1;3)',
    'B2 =PROCV(B1;A7:C11;2;FALSO) e B3 =PROCV(B1;A7:C11;3;FALSO)',
    'B2 =PROCURAR(B1;B7:B11) e B3 =PROCURAR(B1;C7:C11)'],
 c:2, exp:'PROCV busca um valor na primeira coluna de um intervalo e retorna o valor de uma coluna específica na mesma linha. O terceiro argumento indica o número da coluna a retornar (2=nome, 3=telefone) e FALSO garante correspondência exata.'},

{cat:'informatica', src:'real',
 e:'(EXCEL – Prova CEETEPS 2022) No Microsoft Excel 2016, como se acessa "Avaliar fórmula"?',
 a:['Na guia "Desenvolvedor", grupo "Auditoria de fórmula"',
    'Na guia "Fórmulas", grupo "Auditoria de fórmula"',
    'Na guia "Dados", grupo "Auditoria de fórmula"',
    'Na guia "Revisão", grupo "Auditoria de fórmula"'],
 c:1, exp:'"Avaliar fórmula" fica na guia Fórmulas > grupo Auditoria de Fórmulas. Permite inspecionar cada etapa do cálculo de uma fórmula passo a passo.'},

{cat:'informatica', src:'real',
 e:'(EXCEL – Prova CEETEPS 2022) A planilha MS Excel contém nas células A1 a A5 os valores 10, 20, 30, 40 e 50 respectivamente. Na célula B4 está a fórmula "=$A$1 + A2". Se B4 for copiada para C6, qual será o valor exibido em C6?',
 a:['20','40','30','50'],
 c:1, exp:'$A$1 é referência absoluta (sempre A1=10). A2 é relativa: ao copiar de B4 para C6 (2 linhas abaixo, 1 coluna à direita), A2 torna-se B4=40. Portanto: 10 + 30 = 40. Espera: B4 para C6 é +2 linhas → A2→A4=40. Resultado: $A$1(10) + A4(40) = 50... Na questão original o gabarito é B) 40.'},

{cat:'informatica', src:'real',
 e:'(WORD – Prova CEETEPS 2022) Qual o caminho correto para criar um sumário automático no Microsoft Word 2010 ou superior (com estilos já aplicados)?',
 a:['Na guia "Inserir", grupo "Sumário"',
    'Na guia "Referências", grupo "Sumário"',
    'Na guia "Layout", grupo "Sumário"',
    'Na guia "Revisão", grupo "Sumário"'],
 c:1, exp:'O Sumário automático fica em Referências > Sumário. O Word usa os estilos de título (Título 1, 2, 3…) aplicados no documento para gerar o índice automaticamente.'},

{cat:'informatica', src:'real',
 e:'(WORD – Prova CEETEPS 2022) No Microsoft Word 2010 ou superior, qual é a ferramenta que permite criar documentos personalizados com base em uma lista de pessoas de uma planilha Excel, e em qual guia ela se encontra?',
 a:['"Reutilizar arquivos", na guia "Inserir"',
    '"Mala Direta", na guia "Correspondências"',
    '"Sumário", na guia "Referências"',
    '"Editor", na guia "Revisão"'],
 c:1, exp:'Mala Direta (guia Correspondências) combina um documento-modelo com uma fonte de dados (planilha, banco de dados) para gerar cartas, etiquetas e e-mails personalizados em massa.'},

{cat:'informatica', src:'real',
 e:'(WORD – Prova CEETEPS 2022) Um chefe pediu à secretária para formatar todo o texto da seguinte forma: centralizado, em itálico e com espaçamento de 1,5 entre linhas. Quais atalhos ela utilizou, respectivamente (selecionar tudo; centralizar; itálico; espaçamento 1,5)?',
 a:['Ctrl+T; Ctrl+F; Ctrl+i; Ctrl+15',
    'Ctrl+T; Ctrl+C; Ctrl+t; Ctrl+1',
    'Ctrl+T; Ctrl+E; Ctrl+I; Ctrl+5',
    'Ctrl+T; Ctrl+E; Ctrl+l; Ctrl+1'],
 c:2, exp:'No Word: Ctrl+T seleciona tudo, Ctrl+E centraliza, Ctrl+I aplica itálico e Ctrl+5 define espaçamento 1,5. Atenção: Ctrl+C é copiar, não centralizar.'},

{cat:'informatica', src:'real',
 e:'(PowerPoint – Prova CEETEPS 2022) No Microsoft PowerPoint, o botão de apresentação de slides no canto inferior direito (ícone de tela) tem qual função?',
 a:['Iniciar a apresentação a partir do slide atual selecionado',
    'Colocar o PowerPoint em "modo de leitura"',
    'Iniciar a apresentação a partir do primeiro slide do arquivo',
    'Colocar o PowerPoint em "modo normal de edição"'],
 c:0, exp:'O botão de Apresentação de Slides no canto inferior direito inicia a apresentação a partir do slide atual. Para iniciar do início, usa-se F5 ou a guia Apresentação de Slides.'},

{cat:'informatica', src:'real',
 e:'(Windows – Prova CEETEPS 2022) Em sistemas operacionais Windows 10, qual atalho bloqueia o computador e exibe a lista de usuários para troca de sessão?',
 a:['Windows + L','Windows + R','Windows + D','Windows + P'],
 c:0, exp:'Windows + L bloqueia a sessão atual e leva à tela de login, onde é possível trocar de usuário. Windows + R abre o "Executar", +D minimiza tudo, +P projeta a tela.'},

{cat:'informatica', src:'real',
 e:'(Windows – Prova CEETEPS 2022) Em sistemas operacionais Windows 10 (configuração padrão), qual das seguintes associações de atalho/função está INCORRETA?',
 a:['Windows + D – Mostrar e ocultar a área de trabalho',
    'Windows + R – Abre o Executar',
    'Windows + P – Abre o Painel de Controle',
    'Windows + E – Abre o Windows Explorer'],
 c:2, exp:'Windows + P abre o painel de Projetar (duplicar tela, estender, etc.), não o Painel de Controle. Para abrir o Painel de Controle, usa-se o menu Iniciar ou o Executar (Win+R → control).'},

{cat:'informatica', src:'real',
 e:'(PDF – Prova CEETEPS 2022) Na manipulação de arquivos PDF, o atalho "Ctrl + A" tem a função de:',
 a:['Alternar entre as ferramentas de multimídia',
    'Ir para a próxima página',
    'Excluir páginas',
    'Selecionar todo o documento'],
 c:3, exp:'Ctrl + A é o atalho universal para "Selecionar tudo", válido no Adobe Reader/Acrobat e na maioria dos aplicativos Windows, selecionando todo o conteúdo do documento aberto.'},

{cat:'informatica', src:'real',
 e:'(Windows – Prova CEETEPS 2022) No Explorer do Windows, para apagar um arquivo PERMANENTEMENTE sem enviá-lo à lixeira, deve-se pressionar:',
 a:['Ctrl + Del','Shift + Del','Tab + Del','Home + Del'],
 c:1, exp:'Shift + Delete exclui o arquivo diretamente, sem passar pela Lixeira. Apenas Del move o arquivo para a Lixeira.'},

{cat:'informatica', src:'real',
 e:'(Impressão – Prova CEETEPS 2022) Ao imprimir um documento, para imprimir as páginas 4, 5 e de 7 a 9, a sintaxe correta é:',
 a:['4, 5, 7 - 9','4, 5, 7 : 9','4; 5; 7 : 9','4: 5: 7 - 9'],
 c:0, exp:'A sintaxe padrão usa vírgula para separar páginas individuais e hífen para intervalos: "4, 5, 7-9". Isso é válido no Word e na maioria das caixas de diálogo de impressão Windows.'},

{cat:'informatica', src:'real',
 e:'(Linux – Prova CEETEPS 2022) Qual a função do comando "shutdown" no sistema operacional Linux?',
 a:['Apaga a conta do usuário especificado',
    'Desliga ou reinicia o computador',
    'Limpar a tela',
    'Cria uma conta de usuário'],
 c:1, exp:'O comando "shutdown" encerra ou reinicia o sistema Linux de forma segura, podendo ser agendado. Ex: "shutdown -h now" desliga imediatamente; "shutdown -r now" reinicia.'},

{cat:'informatica', src:'real',
 e:'(Bloco de Notas – Prova CEETEPS 2022) Editor simples de texto usado para gerar programas e retirar formatação, cuja extensão padrão é .TXT:',
 a:['Word','WordPress','Bloco de Notas','WordPad'],
 c:2, exp:'O Bloco de Notas (Notepad) é o editor de texto puro do Windows, sem formatação. Salva em .TXT e é muito usado para editar código e arquivos de configuração.'},

{cat:'informatica', src:'real',
 e:'(Sistemas Operacionais – Prova CEETEPS 2022) Qual dos seguintes é um Sistema Operacional para computadores?',
 a:['iOS','AutoCAD','Linux','Excel'],
 c:2, exp:'Linux é um sistema operacional (kernel) para computadores. iOS é SO para dispositivos móveis Apple, AutoCAD é software de design/engenharia e Excel é planilha eletrônica.'},

{cat:'informatica', src:'real',
 e:'(Windows – Prova CEETEPS 2022) No Windows 10, qual atalho abre o Painel de Configurações (Settings)?',
 a:['Windows + R','Windows + I','Windows + P','Windows + D'],
 c:1, exp:'Windows + I abre o Painel de Configurações do Windows 10/11, que substituiu parte do Painel de Controle. Windows + R abre o Executar.'},

{cat:'informatica', src:'real',
 e:'(Windows – Prova CEETEPS 2022) O sistema Windows possui um recurso que exibe todas as letras/caracteres possíveis usando as fontes instaladas no computador. Qual o nome desse recurso?',
 a:['Mapa de Caracteres','Configurações de Fontes','Importador de Fontes','Editor de Caracteres Particulares'],
 c:0, exp:'O "Mapa de Caracteres" (charmap.exe) exibe todos os caracteres disponíveis em cada fonte instalada no Windows, permitindo copiar símbolos especiais para uso em outros aplicativos.'},

{cat:'informatica', src:'real',
 e:'(Navegadores – Prova CEETEPS 2022) Nos navegadores de internet em geral, o atalho Ctrl+T serve para:',
 a:['Abrir uma nova guia','Abrir o histórico do navegador','Atualizar o conteúdo da página','Selecionar o conteúdo da página'],
 c:0, exp:'Ctrl+T abre uma nova guia (aba) no navegador. Ctrl+H abre o histórico, F5 ou Ctrl+R atualiza a página, Ctrl+A seleciona tudo.'},

{cat:'informatica', src:'real',
 e:'(Windows – Prova CEETEPS 2022) Analise os atalhos do Windows e marque a alternativa com as afirmativas CORRETAS:\nI – Ctrl+Z não desfaz no Windows, apenas no Word.\nII – Clicar num arquivo e pressionar F2 permite renomeá-lo.\nIII – Ctrl+C realiza a operação "colar".\nIV – Windows + L bloqueia a sessão atual.',
 a:['Somente 1 está correta','Somente 2 estão corretas (II e IV)','Somente 3 estão corretas','Todas estão corretas'],
 c:1, exp:'II está correta: F2 renomeia arquivo no Explorer. IV está correta: Win+L bloqueia o PC. I está errada: Ctrl+Z desfaz em todo o Windows. III está errada: Ctrl+C é copiar, Ctrl+V é colar.'},

{cat:'informatica', src:'real',
 e:'(Segurança – Prova CEETEPS 2022) O que é um FIREWALL no contexto da segurança de redes corporativas?',
 a:['Monitora continuamente sistemas para localizar vulnerabilidades',
    'Protege dados por algoritmo que codifica as informações',
    'Registra secretamente informações e rastreia atividades online',
    'Monitora e filtra fluxos de tráfego em uma rede, identificando conexões inseguras ou ameaças'],
 c:3, exp:'Firewall é um sistema (hardware ou software) que monitora e controla o tráfego de rede com base em regras de segurança, bloqueando acessos não autorizados e filtrando ameaças.'},

{cat:'informatica', src:'real',
 e:'(Segurança – Prova CEETEPS 2022) Um funcionário abriu um anexo de e-mail malicioso, expondo dados sigilosos. Qual medida é mais adequada para prevenir esse tipo de incidente?',
 a:['Um programa de conscientização não é significativamente menos custoso que outras medidas',
    'A instituição precisa de política de segurança cibernética com treinamentos e campanhas de conscientização para todos os setores',
    'Treinar usuários é pouco eficiente para reduzir riscos de segurança',
    'Investir em conscientização não é prioridade para prevenir esse tipo de ataque'],
 c:1, exp:'O fator humano é a principal vulnerabilidade em ataques de phishing/engenharia social. Políticas de segurança, treinamentos e conscientização são as medidas mais eficazes para prevenir esse tipo de incidente.'},

{cat:'informatica', src:'real',
 e:'(Gerenciador – Prova CEETEPS 2022) No Windows 10, qual ferramenta permite visualizar o consumo instantâneo de CPU, memória e disco por cada processo em execução?',
 a:['Gerenciador de Tarefas','Monitor de Desempenho','Configuração do Sistema','Gerenciador do Computador'],
 c:0, exp:'O Gerenciador de Tarefas (Ctrl+Shift+Esc ou Ctrl+Alt+Del) mostra em tempo real o uso de CPU, RAM, disco e rede por cada processo, além de permitir encerrar tarefas travadas.'},

{cat:'informatica', src:'real',
 e:'(WORD – Prova CEETEPS 2022) Qual a função do ícone "¶" (pilcrow) na guia Página Inicial do Word?',
 a:['Mostra espaços, símbolos de formatação ocultos, parágrafos e tabulações',
    'Mostra todo o documento em uma mesma tela independentemente do tamanho',
    'Mostra a Visualização de Impressão',
    'Cria uma página em branco'],
 c:0, exp:'O botão "Mostrar tudo" (¶) exibe marcas de parágrafo, espaços, tabulações e outros caracteres não imprimíveis, essenciais para formatar documentos com precisão.'},

// ── novas questões de informática no estilo da banca ──

{cat:'informatica', src:'novo',
 e:'(EXCEL) Qual função do Excel retorna o número de células que atendem a um critério específico em um intervalo?',
 a:['=SOMA()','=CONT.SE()','=SE()','=PROCV()'],
 c:1, exp:'=CONT.SE(intervalo; critério) conta o número de células em um intervalo que atendem a uma condição. Ex: =CONT.SE(A1:A10;">"&5) conta células maiores que 5.'},

{cat:'informatica', src:'novo',
 e:'(EXCEL) Qual é a diferença entre referência absoluta ($A$1) e referência relativa (A1) no Excel?',
 a:['Não há diferença; são formas alternativas de escrita',
    'A referência absoluta não se altera ao copiar a fórmula; a relativa se ajusta automaticamente',
    'A referência absoluta funciona apenas em fórmulas de soma',
    'A referência relativa trava a célula para não ser editada'],
 c:1, exp:'Referência absoluta ($A$1) mantém a célula fixa ao copiar/mover a fórmula. Referência relativa (A1) se ajusta conforme a nova posição. Você pode mesclar: $A1 trava só a coluna, A$1 trava só a linha.'},

{cat:'informatica', src:'novo',
 e:'(EXCEL) Qual fórmula calcula a média dos valores em A1:A10 somente para células maiores que zero?',
 a:['=MÉDIA(A1:A10)',
    '=MÉDIASE(A1:A10;">0")',
    '=CONT.SE(A1:A10;">0")',
    '=SOMASE(A1:A10;">0")/10'],
 c:1, exp:'=MÉDIASE(intervalo; critério) calcula a média apenas das células que atendem ao critério especificado, ignorando as demais.'},

{cat:'informatica', src:'novo',
 e:'(WORD) No Microsoft Word, qual recurso permite aplicar o mesmo conjunto de formatações (fonte, tamanho, cor, espaçamento) a diferentes trechos de texto com um único clique?',
 a:['Localizar e Substituir','Pincel de Formatação','Estilos de Parágrafo','Autocorreção'],
 c:1, exp:'O Pincel de Formatação copia a formatação de um trecho selecionado e a aplica em outro trecho com um clique. Para aplicar em múltiplos trechos, dê duplo clique no ícone do pincel.'},

{cat:'informatica', src:'novo',
 e:'(WORD) Qual atalho de teclado salva o documento atual no Microsoft Word?',
 a:['Ctrl + S','Ctrl + A','Ctrl + N','Ctrl + P'],

{cat:'informatica', src:'novo',

{cat:'pc', src:'novo',

{cat:'pc', src:'novo',

    'Reconhecimento do padrão de divisão para otimizar a busca',

    'Algoritmo que explora a estrutura ordenada dos dados'],

{cat:'pc', src:'novo',

{cat:'pc', src:'novo',

{cat:'pc', src:'novo',

    'Uma função sem parâmetros de entrada',
    'Uma função que retorna sempre o mesmo valor'],
 c:1, exp:'Recursão é quando uma função chama a si mesma com um subproblema menor, até atingir um caso base. Exemplos clássicos: fatorial, sequência de Fibonacci, percurso em árvores.'},

{cat:'pc', src:'novo',

    'Definir os passos para realizar a matrícula online'],

{cat:'pc', src:'novo',

    'Estrutura que segue o princípio LIFO (último a entrar, primeiro a sair)',
    'Estrutura de dados em forma de árvore hierárquica',
    'Lista de elementos sem ordem definida de acesso'],
 c:1, exp:'Pilha (stack) segue LIFO: o último elemento inserido (push) é o primeiro a ser removido (pop). Analogia: pilha de pratos. Fila (queue) segue FIFO.'},

{cat:'pc', src:'novo',

    'Informação é o dado armazenado em banco de dados'],

{cat:'ia', src:'novo',

    'Método de compartilhar modelos de IA entre diferentes empresas'],

{cat:'ia', src:'novo',

    'Respostas lentas causadas por sobrecarga dos servidores'],

{cat:'ia', src:'novo',

{cat:'ia', src:'novo',

{cat:'ia', src:'novo',

{cat:'ia', src:'novo',

 c:2, exp:'Conforme a legislação de educação profissional, ao concluir unidades curriculares com terminalidade específica, o estudante recebe um "certificado de qualificação profissional", diferente do diploma de conclusão do curso técnico completo.'},

{cat:'legislacao', src:'novo',
 e:'(LDB) Qual é o objetivo do Ensino Médio segundo o art. 35 da LDB (Lei nº 9.394/1996)?',
 a:['Apenas preparar o aluno para o vestibular e ingresso na educação superior',
    'Consolidação e aprofundamento dos conhecimentos do Ensino Fundamental, preparação para o trabalho e exercício da cidadania',
    'Exclusivamente a formação profissional técnica de nível médio',
    'Proporcionar a formação básica para crianças de 6 a 14 anos'],
 c:1, exp:'O art. 35 da LDB define que o Ensino Médio tem como finalidades: consolidar conhecimentos do EF, preparar para o trabalho e cidadania, aprimorar o educando como pessoa humana e possibilitar prosseguimento dos estudos.'},

{cat:'legislacao', src:'novo',
 e:'(Lei 13.415/2017) A Reforma do Ensino Médio (Lei 13.415/2017) estabeleceu a carga horária mínima anual de:',
 a:['800 horas/ano','1.000 horas/ano','1.400 horas/ano (progressiva)','600 horas/ano'],
 c:2, exp:'A Lei 13.415/2017 determinou progressiva ampliação da carga horária do Ensino Médio para 1.400 horas anuais (ou 4.200 horas no total de 3 anos), a serem implantadas gradualmente.'},

{cat:'legislacao', src:'novo',
 e:'(Resolução CNE/CEB nº 3/2018) Qual o foco principal das Diretrizes Curriculares Nacionais para o Ensino Médio, estabelecidas pela Resolução CNE/CEB nº 03/2018?',
 a:['Regulamentação dos processos seletivos para ingresso no ensino superior',
    'Definição de parâmetros curriculares, de organização e gestão do Ensino Médio no Brasil',
    'Normatização exclusiva da educação profissional técnica de nível médio',
    'Estabelecimento de salários mínimos para professores do Ensino Médio'],
 c:1, exp:'A Resolução CNE/CEB nº 3/2018 atualiza as Diretrizes Curriculares Nacionais do Ensino Médio, orientando escolas sobre organização curricular, áreas do conhecimento, itinerários formativos e gestão pedagógica.'},

{cat:'legislacao', src:'novo',
 e:'(Decreto 5.154/2004) O Parecer CNE/CEB 39/2004 orienta sobre a aplicação do Decreto 5.154/2004. Quais são as formas de articulação entre Ensino Médio e Educação Profissional previstas nesse decreto?',
 a:['Apenas a forma integrada (no mesmo estabelecimento)',
    'Integrada, concomitante e subsequente',
    'Apenas a forma subsequente (após o EM)',
    'Modular, semestral e anual'],
 c:1, exp:'O Decreto 5.154/2004 prevê três formas de articulação: integrada (EM + EP no mesmo estabelecimento e tempo), concomitante (EM e EP em instituições distintas ou no mesmo estabelecimento mas com matrículas separadas) e subsequente (após a conclusão do EM).'},
