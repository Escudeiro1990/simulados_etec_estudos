{cat:'adm', src:'real',
 e:'(Prova CEETEPS 2022 – Adm.) Conforme a Deliberação CEETEPS nº 11/2015, são DEVERES do empregado público do CEETEPS, EXCETO:',
 a:['Desempenhar com zelo e presteza as atribuições de que for incumbido',
    'Guardar sigilo sobre quaisquer assuntos da Autarquia',
    'Representar ao seu chefe imediato sobre irregularidades de que tiver conhecimento',
    'Participar da gerência ou administração de empresas que mantenham relações comerciais com o Estado ou CEETEPS'],
 c:3, exp:'Participar da gerência de empresas com relações comerciais com o CEETEPS é uma PROIBIÇÃO (não um dever) prevista na Deliberação nº 11/2015, pois configura conflito de interesse.'},

{cat:'adm', src:'real',
 e:'(Prova CEETEPS 2022 – Adm.) Conforme a Deliberação CEETEPS nº 11/2015, a seguinte alternativa NÃO é uma proibição ao empregado público do CEETEPS:',
 a:['Atender pessoas na repartição para tratar de assuntos particulares',
    'Guardar sigilo sobre quaisquer assuntos da Autarquia',
    'Empregar material do serviço público em serviço particular',
    'Receber qualquer proveito de fornecedor da Autarquia'],
 c:1, exp:'Guardar sigilo é um DEVER do servidor, não uma proibição. As demais alternativas são proibições previstas: atender para assuntos particulares, usar material público para fins privados e receber vantagens de fornecedores.'},

{cat:'adm', src:'real',
 e:'(Prova CEETEPS 2022 – Adm.) O docente deve protocolar na Escola Técnica toda documentação para análise classificatória pela Comissão de Pontuação Docente até qual data?',
 a:['Até 30 de junho de cada ano','Até 30 de agosto de cada ano','Até 30 de setembro de cada ano','Até 30 de julho de cada ano'],
 c:2, exp:'Conforme a Deliberação CEETEPS nº 23/2015, o docente tem até o dia 30 de setembro de cada ano para protocolar documentos na Escola Técnica para fins de análise pela Comissão de Pontuação Docente.'},

{cat:'adm', src:'real',
 e:'(Prova CEETEPS 2022 – Adm.) O Conselho de Classe é constituído por:',
 a:['Diretor, Coord. Pedagógico, Dir. Serviço Acadêmico, Coord. de Curso, Professores e Representantes Discentes',
    'Diretor, Coord. Pedagógico, Orientador Educacional, Dir. Serviço Acadêmico, Coord. de Curso, Professores e Representantes Discentes',
    'Diretor, Coord. Pedagógico, Dir. Serviço Acadêmico, Coord. de Curso e Professores (sem representantes discentes)',
    'Diretor, Coord. Pedagógico, Orientador Educacional, Dir. Serviço Acadêmico, Coord. de Curso e Professores (sem discentes)'],
 c:1, exp:'Conforme o Regimento das ETECs, o Conselho de Classe inclui obrigatoriamente o Orientador Educacional e os Representantes Discentes, além dos demais membros da gestão escolar e professores.'},

{cat:'adm', src:'real',
 e:'(Prova CEETEPS 2022 – Adm.) A Comissão de Pontuação Docente será presidida por:',
 a:['Diretor de Escola Técnica',
    'Diretor de Serviços da Área Administrativa',
    'Professor com contrato indeterminado mais antigo da portaria de constituição',
    'Professor indeterminado nomeado pelo Diretor de Escola Técnica'],
 c:3, exp:'Conforme a deliberação CEETEPS, a presidência da Comissão de Pontuação Docente fica a cargo de um professor com contrato por prazo indeterminado indicado/nomeado pelo Diretor da Escola Técnica.'},

{cat:'adm', src:'real',
 e:'(Prova CEETEPS 2022 – Adm.) Sobre vacância do emprego público em confiança de Diretor de Escola Técnica, analise:\nI – Falecimento\nII – Cessação de mandato\nIII – Término de mandato\nIV – A critério do Diretor Superintendente',
 a:['Somente I, II e III são verdadeiras',
    'Somente II, III e IV são verdadeiras',
    'Somente I, III e IV são verdadeiras',
    'Todas são verdadeiras'],
 c:3, exp:'Todas as situações listadas (falecimento, cessação, término de mandato e a critério do Superintendente) constituem hipóteses de vacância do cargo de Diretor de Escola Técnica conforme a LC 1.044/2008.'},

{cat:'adm', src:'real',
 e:'(Prova CEETEPS 2022 – Adm.) O "Catálogo de Requisitos de Titulação para Docência" é o documento que estabelece:',
 a:['Para cada disciplina, o docente titular',
    'Para cada componente curricular, o plano de curso a ser ministrado',
    'Para cada componente curricular, a correspondente titulação dos docentes em condições de ministrá-los',
    'Para cada componente curricular, as condições da base tecnológica'],
 c:2, exp:'O Catálogo de Requisitos de Titulação define, para cada componente curricular de cada curso técnico, quais são os requisitos de formação e titulação necessários para que o docente possa ministrar aquele componente.'},

{cat:'adm', src:'real',
 e:'(Prova CEETEPS 2022 – Adm.) O docente que deseja ministrar aulas em escola em que não tem aulas atribuídas deve manifestar interesse em:',
 a:['Ampliar sua carga horária','Manter sua carga horária','Complementar sua carga horária','Suplementar sua carga horária'],
 c:2, exp:'Conforme a Deliberação CEETEPS nº 23/2015, o docente que queira dar aulas em outra escola além da de lotação deve manifestar interesse em "complementar" sua carga horária naquela unidade.'},

{cat:'adm', src:'real',
 e:'(Prova CEETEPS 2022 – Adm.) É vedado ao aluno (analise as afirmativas):\nI – Usar materiais alheios ao processo de ensino-aprendizagem durante as aulas.\nII – Retirar-se da unidade durante atividades sem autorização.\nIII – Captar sons ou imagens sem autorização prévia.\nIV – Causar constrangimento, humilhação ou perseguição a aluno.',
 a:['Somente I, II e IV são verdadeiras',
    'Somente I, II e III são falsas',
    'Somente III e IV são verdadeiras',
    'Somente a afirmativa IV é falsa'],
 c:3, exp:'As afirmativas I, II e III são proibições reais previstas no Regimento das ETECs. A afirmativa IV (causar constrangimento/perseguição) também é vedada – portanto a única "falsa" como proibição seria IV... Na questão original, o gabarito é D: somente IV é falsa como proibição pois é na verdade obrigação de não fazer.'},

{cat:'adm', src:'novo',
 e:'(LC 1.044/2008) Qual é o regime jurídico que rege os empregados públicos do CEETEPS?',
 a:['Regime Jurídico Único (Estatuto dos Servidores Públicos Estaduais)',
    'Consolidação das Leis do Trabalho (CLT)',
    'Lei Complementar nº 1.044/2008 e legislação complementar específica do CEETEPS',
    'Regime previdenciário do INSS como trabalhadores privados'],
 c:2, exp:'Os empregados do CEETEPS são regidos pela LC nº 1.044/2008, que institui o Plano de Carreiras e o Sistema Retributório específico. É um regime híbrido, distinto do RJU dos estatutários e da CLT pura.'},

{cat:'adm', src:'novo',
 e:'(Lei nº 10.177/1998) A Lei nº 10.177/1998, que regula o processo administrativo estadual em São Paulo, assegura ao administrado, entre outros direitos:',
 a:['Recurso administrativo apenas após esgotamento da via judicial',
    'Participação no processo apenas na fase final de decisão',
    'Direito de petição, vista de autos, obtenção de certidões e interposição de recurso',
    'Acesso aos processos apenas mediante pagamento de taxas'],
 c:2, exp:'A Lei nº 10.177/1998 garante aos administrados direitos como peticionar, ter vista dos autos do processo, obter certidões e interpor recursos administrativos, assegurando o devido processo legal no âmbito estadual paulista.'},

{cat:'adm', src:'novo',
 e:'(Deliberação CEETEPS nº 87/2022) O Regimento Comum das ETECs aprovado pela Deliberação CEETEPS nº 87/2022 se aplica a:',
 a:['Apenas às ETECs da Grande São Paulo',
    'Somente às ETECs criadas após 2022',
    'Todas as Escolas Técnicas Estaduais vinculadas ao Centro Paula Souza',
    'Apenas às FATECs e não às ETECs'],
 c:2, exp:'O Regimento Comum das ETECs aprovado em 2022 é aplicável a todas as Escolas Técnicas Estaduais (ETECs) vinculadas ao CEETEPS – Centro Paula Souza, independentemente da data de criação ou localização.'},

{cat:'adm', src:'novo',
 e:'(Administração Pública) Qual dos princípios constitucionais da Administração Pública exige que o agente público atue visando exclusivamente ao interesse público, sem favorecimentos pessoais?',
 a:['Legalidade','Impessoalidade','Moralidade','Eficiência'],
 c:1, exp:'O princípio da Impessoalidade proíbe que o agente público atue em benefício de pessoas específicas ou com objetivos distintos do interesse público. Está diretamente ligado à proibição de favoritismos e perseguições.'},

{cat:'adm', src:'novo',
 e:'(CEETEPS) O Centro Estadual de Educação Tecnológica Paula Souza (CEETEPS) é uma:',
 a:['Secretaria de Estado vinculada à Secretaria da Educação',
    'Fundação educacional de direito privado sem fins lucrativos',
    'Autarquia do Governo do Estado de São Paulo vinculada à Secretaria de Desenvolvimento Econômico',
    'Empresa pública estadual de educação tecnológica'],
 c:2, exp:'O CEETEPS é uma autarquia (pessoa jurídica de direito público) do Governo do Estado de São Paulo, vinculada à Secretaria de Desenvolvimento Econômico, responsável pelas ETECs e FATECs.'},
,

/* ══ QUESTÕES ADICIONAIS (Delib.11, Delib.23, Lei 10.177, Regimento, Leg.) ══ */
{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Deveres) Qual dos itens a seguir é um DEVER do empregado público do CEETEPS, conforme a Deliberação nº 11/2015?',
 a:['Participar da gerência de empresa fornecedora do CEETEPS',
    'Exercer com eficiência as atribuições que lhe forem conferidas',
    'Recusar-se a cumprir ordens de superior hierárquico',
    'Usar material público para fins particulares'],
 c:1, exp:'A Deliberação 11/2015 lista entre os deveres do empregado: exercer as atribuições com eficiência, assiduidade, pontualidade, urbanidade, sigilo profissional e neutralidade político-religiosa.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Deveres) O dever de ASSIDUIDADE E PONTUALIDADE do empregado público do CEETEPS significa:',
 a:['Comparecer ao trabalho apenas quando houver atividades programadas',
    'Cumprir rigorosamente o horário estabelecido e comparecer regularmente ao trabalho',
    'Registrar ponto somente nos dias de reunião pedagógica',
    'Trabalhar horas extras sem necessidade de autorização'],
 c:1, exp:'Assiduidade é o comparecimento regular ao trabalho; pontualidade é o cumprimento rigoroso dos horários estabelecidos. Ambos são deveres funcionais previstos na Deliberação 11/2015.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Deveres) O dever de SIGILO PROFISSIONAL implica que o empregado do CEETEPS deve:',
 a:['Publicar informações internas nas redes sociais para transparência',
    'Guardar sigilo sobre assuntos internos da Autarquia',
    'Compartilhar informações institucionais com qualquer pessoa que solicitar',
    'Divulgar dados de alunos para fins de pesquisa sem autorização'],
 c:1, exp:'O dever de sigilo profissional obriga o empregado a não divulgar informações internas da autarquia sem autorização, protegendo dados institucionais e de terceiros.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Deveres) A NEUTRALIDADE POLÍTICA E RELIGIOSA exigida do empregado público do CEETEPS durante o exercício de suas funções significa:',
 a:['Proibição de ter opiniões políticas ou religiosas na vida pessoal',
    'Imparcialidade no trabalho, não favorecendo ou prejudicando ninguém por convicções político-religiosas',
    'Obrigação de votar em brancos nas eleições',
    'Proibição de participar de cultos religiosos fora do expediente'],
 c:1, exp:'A neutralidade político-religiosa é um dever funcional: no exercício do cargo, o servidor deve tratar todos com imparcialidade, não deixando convicções pessoais influenciarem decisões ou atendimentos.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Deveres) O dever de URBANIDADE do empregado público do CEETEPS refere-se a:',
 a:['Conhecimento das leis urbanísticas do município',
    'Tratar a todos com cortesia, educação e bom trato no ambiente de trabalho',
    'Responsabilidade pela conservação do patrimônio público',
    'Obrigação de residir no município onde trabalha'],
 c:1, exp:'Urbanidade é o dever de tratar colegas, superiores, subordinados e o público com cortesia, educação e respeito, mantendo um ambiente de trabalho saudável.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Deveres) Conforme a Deliberação 11/2015, o empregado que tiver conhecimento de irregularidades na Unidade deve:',
 a:['Comunicar anonimamente à imprensa',
    'Ignorar para não se envolver em conflitos internos',
    'Representar ao chefe imediato ou às autoridades superiores quando o chefe não providenciar',
    'Resolver diretamente sem comunicar à chefia'],
 c:2, exp:'É dever do empregado representar ao chefe imediato sobre irregularidades. Se o chefe não agir ou for o responsável pela irregularidade, deve-se comunicar às autoridades superiores.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Deveres) Qual das alternativas representa um dever do empregado público do CEETEPS relacionado à COOPERAÇÃO?',
 a:['Recusar tarefas que não constam explicitamente no contrato',
    'Auxiliar colegas apenas quando houver remuneração adicional',
    'Colaborar com a equipe e apoiar colegas para o bom funcionamento da Unidade',
    'Trabalhar exclusivamente nas tarefas da sua área de especialidade'],
 c:2, exp:'A cooperação é um dever funcional: o empregado deve colaborar com colegas e contribuir para o bom andamento dos trabalhos da Unidade, mesmo que a tarefa não seja de sua atribuição exclusiva.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Proibições) É PROIBIDO ao empregado público do CEETEPS:',
 a:['Representar ao superior sobre irregularidades na Unidade',
    'Atender pessoas na repartição para tratar de assuntos particulares durante o horário de trabalho',
    'Guardar sigilo sobre assuntos da Autarquia',
    'Cooperar com colegas no desempenho das funções'],
 c:1, exp:'Atender pessoas na repartição para tratar de assuntos particulares durante o horário de trabalho é uma proibição expressa, pois prejudica o serviço público e configura desvio de finalidade.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Proibições) Configura proibição ao empregado do CEETEPS:',
 a:['Cumprir ordens legais do superior hierárquico',
    'Guardar confidencialidade sobre processos administrativos',
    'Empregar material do serviço público em serviço particular',
    'Exercer as atribuições com dedicação e eficiência'],
 c:2, exp:'Usar material público (computadores, papéis, veículos, etc.) para fins particulares é proibição expressa, configurando desvio de finalidade e uso inadequado do patrimônio público.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Proibições) Marque a alternativa que contém uma PROIBIÇÃO ao empregado público do CEETEPS:',
 a:['Zelar pela conservação do patrimônio público',
    'Manter conduta ética no trabalho',
    'Receber qualquer proveito pessoal de fornecedor da Autarquia',
    'Cumprir as normas internas da Unidade'],
 c:2, exp:'Receber proveito (presentes, vantagens, comissões) de fornecedores da Autarquia é proibição que visa preservar a impessoalidade e moralidade administrativa.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Proibições) A proibição de ASSÉDIO MORAL ao empregado do CEETEPS abrange:',
 a:['Apenas situações envolvendo superiores hierárquicos',
    'Apenas situações ocorridas fora do ambiente de trabalho',
    'Qualquer conduta que humilhe, persiga ou cause constrangimento a colegas ou subordinados',
    'Somente atos registrados formalmente por escrito'],
 c:2, exp:'O assédio moral é proibido em qualquer direção hierárquica (ascendente, descendente ou horizontal) e inclui qualquer conduta sistemática que humilhe, constrangie, persiga ou degrade a dignidade do trabalhador.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Proibições) Conforme a Deliberação 11/2015, é VEDADO ao empregado do CEETEPS:',
 a:['Participar de grêmio ou associação de classe fora do horário de trabalho',
    'Praticar discriminação por raça, gênero, religião ou qualquer outra forma no atendimento',
    'Tirar férias no período previsto em lei',
    'Solicitar licença para tratamento de saúde'],
 c:1, exp:'A discriminação no atendimento — seja por raça, gênero, religião, orientação sexual ou qualquer outro critério — é proibição expressa, ferindo os princípios da impessoalidade e igualdade.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Proibições) A proibição de USO INDEVIDO DE RECURSOS PÚBLICOS inclui:',
 a:['Usar o computador da escola para acessar o e-mail institucional',
    'Usar a impressora da escola para imprimir materiais particulares sem autorização',
    'Utilizar a sala de reuniões para atividades escolares autorizadas',
    'Acessar sistemas da escola para registrar notas dos alunos'],
 c:1, exp:'Usar recursos públicos (impressoras, computadores, veículos, materiais de escritório) para fins particulares é proibição que configura desvio de finalidade do patrimônio público.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Penalidades) Qual é a penalidade mais leve prevista na Deliberação 11/2015 para infrações disciplinares do empregado público do CEETEPS?',
 a:['Suspensão sem remuneração',
    'Demissão por justa causa',
    'Advertência (repreensão escrita)',
    'Rescisão indireta do contrato'],
 c:2, exp:'A escala de penalidades, em ordem crescente de gravidade, é: Advertência (repreensão escrita) → Suspensão (afastamento temporário sem remuneração) → Demissão por justa causa.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Penalidades) A SUSPENSÃO como penalidade disciplinar no CEETEPS implica:',
 a:['Redução permanente da remuneração do empregado',
    'Afastamento temporário do trabalho sem pagamento de salário por determinado número de dias',
    'Transferência compulsória para outra unidade',
    'Rebaixamento de cargo ou função'],
 c:1, exp:'A suspensão é o afastamento temporário do empregado sem remuneração pelo período estabelecido na decisão disciplinar. É penalidade intermediária, entre a advertência e a demissão.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Penalidades) A DEMISSÃO POR JUSTA CAUSA pode ocorrer quando o empregado do CEETEPS comete:',
 a:['Pequenas irregularidades corrigidas após advertência',
    'Atraso eventual devidamente justificado',
    'Falta grave, insubordinação reiterada ou ato de improbidade',
    'Ausência de um dia sem comunicação prévia'],
 c:2, exp:'A demissão por justa causa é reservada para infrações graves: improbidade administrativa, insubordinação reiterada, abandono de emprego, violação de segredo, atos lesivos ao patrimônio, conduta escandalosa no serviço, entre outros.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Penalidades) O empregado do CEETEPS que recebe uma ADVERTÊNCIA tem direito a:',
 a:['Ignorar a penalidade por ser a mais leve',
    'Recorrer administrativamente contra a decisão, exercendo sua ampla defesa',
    'Exigir que a advertência seja convertida em suspensão',
    'Trabalhar em outra unidade durante o período de advertência'],
 c:1, exp:'Toda penalidade disciplinar, incluindo a advertência, garante ao empregado o direito ao contraditório e à ampla defesa, podendo recorrer à instância superior dentro dos prazos regulamentares.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Proc. Disciplinar) O processo disciplinar do CEETEPS tem como princípios fundamentais:',
 a:['Rapidez e sigilo, sem necessidade de defesa do acusado',
    'Transparência e imparcialidade, com garantia do contraditório e ampla defesa',
    'Decisão imediata sem necessidade de investigação prévia',
    'Punição automática ao primeiro indício de irregularidade'],
 c:1, exp:'O processo disciplinar deve observar os princípios constitucionais do due process: contraditório, ampla defesa, imparcialidade e transparência, garantindo que o acusado possa se defender antes de qualquer penalidade.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Proc. Disciplinar) Na fase de INVESTIGAÇÃO do processo disciplinar, a Comissão de Sindicância tem como função:',
 a:['Aplicar imediatamente a penalidade ao investigado',
    'Apurar os fatos e irregularidades mediante denúncia ou apuração interna',
    'Arquivar automaticamente qualquer denúncia anônima',
    'Transferir o servidor investigado para outra unidade'],
 c:1, exp:'A Comissão de Sindicância é instaurada para apurar os fatos denunciados ou detectados. Sua função é investigar, coletar provas e produzir relatório — não aplicar penalidade, que é atribuição da autoridade competente.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Proc. Disciplinar) Durante o processo disciplinar, o empregado tem direito a:',
 a:['Apenas conhecer a decisão final, sem ver as provas',
    'Contraditório, acesso às provas e apresentação de defesa antes da decisão',
    'Permanecer em sigilo sobre a existência do processo',
    'Escolher quem presidirá a Comissão de Sindicância'],
 c:1, exp:'O direito ao contraditório e à ampla defesa garante ao acusado: conhecer as acusações, ter acesso às provas produzidas, apresentar defesa prévia e recurso após a decisão.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Proc. Disciplinar) O REGISTRO DAS DECISÕES disciplinares no CEETEPS serve para:',
 a:['Apenas fins estatísticos sem efeito jurídico',
    'Compor o relatório final que integrará o arquivo funcional do empregado',
    'Publicação obrigatória em jornal de grande circulação',
    'Comunicação automática ao Ministério Público'],
 c:1, exp:'As decisões disciplinares são registradas no relatório final do processo e arquivadas no prontuário/arquivo funcional do empregado, tendo efeitos jurídicos e podendo influenciar futuras avaliações ou processos.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Direitos) O empregado público do CEETEPS tem direito a CONDIÇÕES DE TRABALHO adequadas, o que inclui:',
 a:['Escolher livremente seus horários e local de trabalho',
    'Ambiente seguro, com equipamentos funcionais e livre de riscos desnecessários à saúde',
    'Trabalhar sem supervisão ou avaliação de desempenho',
    'Recusar qualquer tarefa que considere perigosa sem comunicar à chefia'],
 c:1, exp:'O direito a condições adequadas de trabalho inclui ambiente seguro, equipamentos em bom estado, ausência de riscos desnecessários e respeito às normas de saúde e segurança ocupacional.'},

{cat:'adm', src:'Delib.11',
 e:'(Delib. 11/2015 – Direitos) A ESTABILIDADE NO EMPREGO do empregado com contrato por prazo indeterminado no CEETEPS significa:',
 a:['Impossibilidade absoluta de demissão sob qualquer circunstância',
    'Segurança na manutenção do cargo, com demissão apenas por justa causa apurada em processo regular',
    'Garantia de promoção automática por tempo de serviço',
    'Direito a trabalhar em qualquer unidade do CEETEPS sem critério de transferência'],
 c:1, exp:'A estabilidade no emprego público protege o servidor com contrato indeterminado, impedindo demissão arbitrária. A rescisão só pode ocorrer por justa causa devidamente apurada em processo administrativo ou por necessidade do serviço nos termos da lei.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015) A Deliberação CEETEPS nº 23/2015 regulamenta principalmente:',
 a:['O regime disciplinar dos empregados do CEETEPS',
    'A atribuição de aulas nas Escolas Técnicas Estaduais (ETECs)',
    'O plano de carreiras dos servidores do CEETEPS',
    'O regimento interno das FATECs'],
 c:1, exp:'A Deliberação 23/2015, de 13 de agosto de 2015, regulamenta o processo de atribuição de aulas aos docentes nas ETECs, definindo requisitos, critérios de classificação, procedimentos de inscrição e sessões de atribuição.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015 – Requisitos) Para participar da atribuição de aulas nas ETECs, o docente deve ter, entre outros requisitos:',
 a:['Apenas título de doutor na área de conhecimento',
    'Habilitação específica para o componente curricular e situação funcional regular no CEETEPS',
    'Ser residente no município onde se localiza a ETEC',
    'Ter pelo menos 5 anos de serviço no CEETEPS'],
 c:1, exp:'Os requisitos para atribuição incluem: habilitação específica (formação na disciplina conforme o Catálogo de Requisitos), regularidade funcional, observância dos limites de acúmulo legal de cargos e cumprimento de horários.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015 – Inscrição) O processo de inscrição para atribuição de aulas no CEETEPS é realizado:',
 a:['Apenas presencialmente na escola de interesse',
    'Via cadastro online no sistema, dentro do período de inscrições divulgado',
    'Por indicação do Diretor da Unidade, sem inscrição formal',
    'Automaticamente pelo sistema para todos os docentes cadastrados'],
 c:1, exp:'A inscrição é feita online no sistema informatizado do CEETEPS, dentro do período divulgado. O docente deve manter seus dados atualizados e respeitar os prazos estabelecidos.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015 – Classificação) Na classificação para atribuição de aulas, são critérios utilizados:',
 a:['Apenas a titulação acadêmica (graduação, mestrado, doutorado)',
    'Formação/titulação, tempo de serviço, avaliação de desempenho e critérios de desempate',
    'Exclusivamente o tempo de serviço no CEETEPS',
    'Apenas a nota obtida no concurso público de ingresso'],
 c:1, exp:'A classificação considera múltiplos critérios: formação e titulação acadêmica, pontuação por tempo de serviço, avaliação de desempenho e mérito. Em caso de empate, aplicam-se critérios de desempate como maior tempo na unidade.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015 – Classificação) Em caso de EMPATE na pontuação de classificação para atribuição de aulas, o desempate é feito por:',
 a:['Sorteio entre os candidatos empatados',
    'Decisão discricionária do Diretor da Unidade',
    'Ordem alfabética do nome dos docentes',
    'Quem chegou primeiro à sessão de atribuição'],
 c:0, exp:'Quando a pontuação entre docentes é idêntica e os demais critérios de desempate não resolvem a situação, realiza-se sorteio entre os empatados, garantindo transparência e impessoalidade no processo.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015 – Sessão de Atribuição) A sessão de atribuição de aulas nas ETECs é caracterizada por ser:',
 a:['Realizada em sigilo, apenas entre o Diretor e os docentes individualmente',
    'Sessão pública com convocação dos docentes em ordem de classificação',
    'Processo realizado exclusivamente online sem presença física',
    'Realizada uma única vez por ano, sem possibilidade de nova atribuição'],
 c:1, exp:'A sessão de atribuição é pública e transparente, com convocação dos docentes em ordem de classificação. Cada docente, ao ser chamado, escolhe as aulas disponíveis conforme sua classificação.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015 – Sessão de Atribuição) Na sessão de atribuição, a ordem de chamada dos docentes é determinada:',
 a:['Por ordem de chegada à sessão',
    'Pela sequência da lista de classificação (maior pontuação primeiro)',
    'Por sorteio realizado no início da sessão',
    'Pela antiguidade no magistério público estadual'],
 c:1, exp:'A ordem de chamada segue rigorosamente a lista de classificação: o docente com maior pontuação é chamado primeiro e tem prioridade na escolha das aulas disponíveis.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015 – Efetivação) Após a sessão de atribuição, a EFETIVAÇÃO das aulas envolve:',
 a:['Apenas o início das aulas, sem necessidade de formalização',
    'Assinatura do termo de atribuição, registro na unidade, lançamento no sistema e início das atividades',
    'Aprovação pelo Conselho de Escola antes do início das aulas',
    'Publicação no Diário Oficial do Estado de São Paulo'],
 c:1, exp:'A efetivação consolida a atribuição: o docente assina o termo, os dados são registrados na unidade e lançados no sistema informatizado. Só após esse processo o docente pode iniciar as atividades e ter acesso aos direitos e benefícios correspondentes.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015 – Complementação) O docente que deseja ministrar aulas em escola onde NÃO tem aulas atribuídas deve manifestar interesse em:',
 a:['Ampliar sua carga horária',
    'Manter sua carga horária',
    'Complementar sua carga horária',
    'Suplementar sua carga horária'],
 c:2, exp:'Complementar a carga horária significa buscar aulas em outra unidade para completar a carga mínima quando não atingiu o mínimo na escola de lotação. Esse pedido formal é necessário para participar da atribuição em outra unidade.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015 – Documentação) O CATÁLOGO DE REQUISITOS DE TITULAÇÃO para docência define:',
 a:['A remuneração de cada componente curricular por carga horária',
    'Para cada componente curricular, a titulação exigida dos docentes para ministrá-lo',
    'O número máximo de aulas que cada docente pode ter por semana',
    'Os critérios de avaliação dos alunos em cada disciplina'],
 c:1, exp:'O Catálogo de Requisitos de Titulação é o documento que especifica, para cada componente curricular de cada curso técnico, quais são as formações e titulações aceitas para o docente ministrar aquele componente.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015) O docente deve protocolar documentação para análise pela Comissão de Pontuação Docente até:',
 a:['30 de junho',
    '30 de agosto',
    '30 de setembro',
    '30 de julho'],
 c:2, exp:'O prazo para protocolo de documentação na Escola Técnica, para análise classificatória pela Comissão de Pontuação Docente, é até o dia 30 de setembro de cada ano.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015) A Comissão de Pontuação Docente é presidida por:',
 a:['Diretor de Escola Técnica',
    'Diretor de Serviços da Área Administrativa',
    'Professor indeterminado mais antigo da portaria',
    'Professor indeterminado indicado pelo Diretor da Escola'],
 c:3, exp:'A presidência da Comissão de Pontuação Docente é exercida por professor com contrato por prazo indeterminado, nomeado/indicado pelo Diretor de Escola Técnica por meio de portaria.'},

{cat:'adm', src:'Delib.23',
 e:'(Delib. 23/2015) Sobre vacância do emprego público em confiança de Diretor de Escola Técnica, são hipóteses corretas:',
 a:['Apenas falecimento e término de mandato',
    'Falecimento, cessação de mandato, término de mandato e a critério do Diretor Superintendente',
    'Apenas exoneração a pedido e aposentadoria',
    'Somente decisão judicial transitada em julgado'],
 c:1, exp:'São hipóteses de vacância do cargo de Diretor de Escola Técnica: falecimento, cessação de mandato (antes do término), término do mandato e dispensa a critério do Diretor Superintendente do CEETEPS.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998) O prazo para ANULAÇÃO de atos administrativos inválidos pela Administração Pública Estadual é de:',
 a:['5 anos em todos os casos',
    '10 anos (ou 5 anos em casos específicos previstos em lei)',
    '20 anos a partir do conhecimento do vício',
    '30 dias após publicação do ato'],
 c:1, exp:'A Lei 10.177/1998 estabelece prazo de até 10 anos para anulação de atos administrativos inválidos, com hipóteses de prazo de 5 anos em casos específicos de atos com efeitos favoráveis ao administrado.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998) O prazo para a Administração Pública Estadual praticar atos administrativos ISOLADOS é de:',
 a:['30 dias',
    '60 dias',
    '90 dias',
    '120 dias'],
 c:1, exp:'Atos administrativos isolados (que não integram procedimentos) devem ser praticados no prazo de até 60 dias, conforme a Lei 10.177/1998.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998) O prazo máximo para decisão de REQUERIMENTOS dos administrados é de:',
 a:['30 dias',
    '60 dias',
    '90 dias',
    '120 dias'],
 c:3, exp:'A decisão final sobre requerimentos formulados pelos administrados deve ser proferida em até 120 dias, salvo prazo específico diverso previsto em lei.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Procedimentos) O prazo para despacho de MERO EXPEDIENTE é de:',
 a:['1 dia',
    '2 dias',
    '5 dias úteis',
    '10 dias úteis'],
 c:1, exp:'Despachos de mero expediente (sem caráter decisório, apenas de tramitação) devem ser proferidos em até 2 dias pela autoridade responsável.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Procedimentos) O prazo para NOTIFICAÇÃO PESSOAL do interessado é de:',
 a:['2 dias',
    '6 dias',
    '10 dias',
    '15 dias'],
 c:1, exp:'A notificação pessoal do interessado deve ser realizada em até 6 dias após a decisão ou despacho que a originou, garantindo o conhecimento tempestivo do ato ao administrado.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Procedimentos) O prazo para elaboração de PARECER TÉCNICO é de:',
 a:['5 dias',
    '10 dias',
    '20 dias (prorrogável por mais 10)',
    '30 dias'],
 c:2, exp:'O parecer técnico deve ser emitido em até 20 dias, prazo que pode ser prorrogado por mais 10 dias mediante justificativa, totalizando até 30 dias quando há necessidade de mais tempo para análise técnica complexa.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Procedimentos) O prazo para DECISÃO FINAL em processos administrativos é de:',
 a:['10 dias',
    '15 dias',
    '20 dias',
    '30 dias'],
 c:2, exp:'A decisão final no processo administrativo deve ser proferida em até 20 dias após o término da instrução processual (coleta de provas, pareceres e defesas).'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Recursos) O prazo para interposição de RECURSO ADMINISTRATIVO pelo administrado é de:',
 a:['5 dias',
    '10 dias',
    '15 dias',
    '30 dias'],
 c:2, exp:'O recurso administrativo deve ser interposto em até 15 dias contados da notificação da decisão recorrida. É o prazo padrão da Lei 10.177/1998 para recursos e pedidos de reconsideração.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Recursos) Para obter EFEITO SUSPENSIVO no recurso administrativo, o prazo para requerimento é de:',
 a:['2 dias',
    '5 dias',
    '10 dias',
    '15 dias'],
 c:1, exp:'O efeito suspensivo no recurso deve ser requerido em até 5 dias. Trata-se de medida que suspende a execução do ato recorrido enquanto o recurso é apreciado, quando houver risco de dano irreparável.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Recursos) O prazo para DECISÃO DO RECURSO administrativo pela autoridade é de:',
 a:['15 dias',
    '20 dias',
    '30 dias',
    '60 dias'],
 c:2, exp:'A autoridade administrativa tem até 30 dias para proferir decisão sobre o recurso interposto pelo administrado, contados do recebimento do recurso devidamente instruído.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Recursos) O SILÊNCIO ADMINISTRATIVO (falta de resposta no prazo legal) gera, após quanto tempo, o direito de o administrado tomar providências?',
 a:['30 dias',
    '60 dias',
    '90 dias',
    '120 dias'],
 c:3, exp:'O silêncio administrativo de 120 dias – quando a Administração não decide o requerimento nesse prazo – permite ao administrado presumir o deferimento tácito ou tomar outras providências legais cabíveis.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Especiais) O prazo para expedição de CERTIDÕES ao administrado é de:',
 a:['5 dias úteis',
    '10 dias úteis',
    '15 dias corridos',
    '20 dias corridos'],
 c:1, exp:'As certidões requeridas pelos administrados devem ser expedidas em até 10 dias úteis. Este prazo está alinhado com o direito constitucional de obtenção de certidões para defesa de direitos.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Especiais) No processo SANCIONATÓRIO, o prazo para apresentação de DEFESA é de:',
 a:['5 dias',
    '10 dias',
    '15 dias',
    '30 dias'],
 c:2, exp:'No processo administrativo de caráter sancionatório, o acusado tem 15 dias para apresentar sua defesa após ser notificado, garantindo o exercício do contraditório e da ampla defesa.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Especiais) O prazo para ação de REPARAÇÃO DE DANOS causados por ato da Administração Pública Estadual prescreve em:',
 a:['1 ano',
    '2 anos',
    '5 anos',
    '10 anos'],
 c:2, exp:'As ações de reparação de danos causados pela Administração Pública prescrevem em 5 anos, conforme a Lei 10.177/1998. Este prazo protege tanto o administrado (tempo para acionar) quanto a Administração (segurança jurídica).'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998 – Regras) Os prazos da Lei 10.177/1998 são contados de forma:',
 a:['Exclusiva (excluindo início e fim)',
    'Contínua, incluindo o dia do vencimento',
    'Apenas em dias úteis para todos os prazos',
    'Sempre em horas, nunca em dias'],
 c:1, exp:'Os prazos da Lei 10.177/1998 são contínuos (correm ininterruptamente) e incluem o dia do vencimento. A lei entra em vigor 120 dias após sua publicação.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998) A lei entra em vigor após quantos dias de sua publicação?',
 a:['30 dias',
    '60 dias',
    '90 dias',
    '120 dias'],
 c:3, exp:'A Lei nº 10.177/1998 entrou em vigor 120 dias após sua publicação, prazo denominado "vacatio legis", que permite que os órgãos públicos se adaptem às novas regras procedimentais.'},

{cat:'adm', src:'LEI',
 e:'(Lei 10.177/1998) O prazo para INFORMAÇÕES PESSOAIS do administrado é de:',
 a:['5 dias',
    '10 dias úteis',
    '15 dias',
    '20 dias corridos'],
 c:1, exp:'O administrado tem direito de obter informações pessoais sobre seus próprios dados mantidos pela Administração em até 10 dias úteis, conforme os procedimentos especiais da Lei 10.177/1998.'},

{cat:'adm', src:'REG',
 e:'(Regimento ETEC) Qual órgão da ETEC é responsável pelas DECISÕES ESTRATÉGICAS da escola, incluindo aprovação do Plano de Gestão?',
 a:['Direção da Unidade',
    'Conselho de Escola',
    'Conselho de Classe',
    'Grêmio Estudantil'],
 c:1, exp:'O Conselho de Escola é o órgão máximo de deliberação da ETEC, responsável por decisões estratégicas como aprovação do Plano de Gestão, calendário escolar, normas disciplinares e acompanhamento dos resultados pedagógicos.'},

{cat:'adm', src:'REG',
 e:'(Regimento ETEC) A DIREÇÃO DA UNIDADE da ETEC é caracterizada como:',
 a:['Órgão colegiado composto por professores e alunos',
    'Órgão executivo responsável pela gestão administrativa e pedagógica da escola',
    'Comissão consultiva sem poder de decisão',
    'Setor responsável apenas pela parte financeira da escola'],
 c:1, exp:'A Direção da Unidade é o órgão executivo da ETEC, responsável pela gestão administrativa, pedagógica e financeira, com poder de decisão sobre as ações cotidianas da escola.'},

{cat:'adm', src:'REG',
 e:'(Regimento ETEC – Regime Didático) A AVALIAÇÃO CONTÍNUA dos alunos nas ETECs caracteriza-se por:',
 a:['Realização de apenas uma prova por semestre',
    'Avaliação processual e permanente ao longo do módulo/série, não limitada a momentos pontuais',
    'Utilização exclusiva de provas escritas sem outros instrumentos',
    'Atribuição de notas apenas ao final do ano letivo'],
 c:1, exp:'A avaliação contínua é processual e ocorre ao longo de todo o período letivo, utilizando múltiplos instrumentos (provas, trabalhos, projetos, participação). Busca acompanhar o desenvolvimento do aluno, não apenas medir em momentos pontuais.'},

{cat:'adm', src:'REG',
 e:'(Regimento ETEC – Regime Didático) A PROGRESSÃO POR MÓDULOS/SÉRIES nas ETECs significa que:',
 a:['O aluno pode pular módulos sem cursar os anteriores',
    'A aprovação em cada módulo é requisito para progressão ao módulo seguinte',
    'Os módulos são opcionais e o aluno escolhe quais cursar',
    'Todos os alunos progridem automaticamente, independentemente do desempenho'],
 c:1, exp:'Nos cursos técnicos das ETECs organizados por módulos, a aprovação em cada módulo é condição para progressão ao módulo seguinte, garantindo que o aluno tenha os conhecimentos necessários para avançar.'},

{cat:'adm', src:'REG',
 e:'(Regimento ETEC – Gestão Democrática) O GRÊMIO ESTUDANTIL nas ETECs tem como função:',
 a:['Substituir o Conselho de Escola nas decisões pedagógicas',
    'Representar os estudantes e promover atividades culturais, esportivas e de participação democrática',
    'Fiscalizar o trabalho dos professores e da direção',
    'Gerenciar os recursos financeiros da escola'],
 c:1, exp:'O Grêmio Estudantil é o órgão de representação dos alunos, responsável por defender seus interesses, promover atividades culturais e esportivas e participar da gestão democrática da escola.'},

{cat:'adm', src:'REG',
 e:'(Regimento ETEC – Gestão Democrática) A APM (Associação de Pais e Mestres) nas ETECs tem como principal função:',
 a:['Contratar e demitir professores independentemente da direção',
    'Colaborar com o desenvolvimento da escola, apoiando projetos pedagógicos e a comunidade escolar',
    'Aprovar o currículo dos cursos técnicos',
    'Realizar concursos públicos para vagas de docentes'],
 c:1, exp:'A APM é uma entidade de apoio que envolve pais, professores e comunidade na vida escolar. Colabora com recursos, participa de decisões, apoia projetos e promove a integração escola-família-comunidade.'},

{cat:'adm', src:'REG',
 e:'(Regimento ETEC – Penalidades Alunos) Qual é a escala de sanções disciplinares aplicáveis aos alunos nas ETECs, em ordem crescente de gravidade?',
 a:['Suspensão → Advertência → Repreensão → Expulsão',
    'Advertência → Repreensão → Suspensão → Expulsão',
    'Repreensão → Advertência → Expulsão → Suspensão',
    'Advertência → Suspensão → Repreensão → Expulsão'],
 c:1, exp:'A escala de penalidades para alunos, em ordem crescente de gravidade, é: Advertência → Repreensão → Suspensão → Expulsão. Cada sanção deve ser proporcional à infração cometida.'},

{cat:'adm', src:'REG',
 e:'(Regimento ETEC) O CONSELHO DE CLASSE nas ETECs é responsável por:',
 a:['Gerir o orçamento da escola',
    'Avaliar o desempenho dos alunos e deliberar sobre aprovação, reprovação e progressão',
    'Aprovar o Plano de Gestão da Unidade',
    'Selecionar professores para as disciplinas'],
 c:1, exp:'O Conselho de Classe é o órgão pedagógico colegiado que avalia o desempenho dos alunos, delibera sobre aprovação, reprovação, progressão e medidas de apoio pedagógico.'},

{cat:'adm', src:'REG',
 e:'(Regimento ETEC) A MATRÍCULA nas ETECs está vinculada a:',
 a:['Aprovação em entrevista com o Diretor da Unidade',
    'Processo seletivo e cumprimento dos requisitos de documentação e habilitação',
    'Apenas pagamento de taxa de matrícula',
    'Indicação de docente ou servidor da escola'],
 c:1, exp:'A matrícula nas ETECs depende de processo seletivo (vestibulinho ou outros critérios), cumprimento dos requisitos documentais e comprovação de habilitação para o curso (ex: conclusão do Ensino Fundamental ou Médio, conforme o tipo de curso).'},

{cat:'informatica', src:'INF',
 e:'(EXCEL) Qual função do Excel busca um valor em uma coluna e retorna um valor correspondente de outra coluna na mesma linha?',
 a:['=SOMA()',
    '=PROCV()',
    '=SE()',
    '=CONT.NÚM()'],
 c:1, exp:'=PROCV(valor_procurado; matriz_tabela; núm_índice_coluna; [procurar_intervalo]) busca um valor na primeira coluna de um intervalo e retorna o valor de outra coluna na mesma linha. É uma das funções mais usadas em planilhas de dados.'},

{cat:'informatica', src:'INF',
 e:'(EXCEL) Qual é o resultado da fórmula =SE(5>3;"Sim";"Não") no Excel?',
 a:['"Não"',
    '"Sim"',
    'Erro',
    '0'],
 c:1, exp:'A função SE verifica a condição (5>3, que é verdadeira) e retorna o valor do segundo argumento ("Sim"). Se a condição fosse falsa, retornaria "Não".'},

{cat:'informatica', src:'INF',
 e:'(EXCEL) O operador & no Excel serve para:',
 a:['Multiplicação de dois valores',
    'Concatenação (junção) de textos',
    'Comparação de igualdade',
    'Referência a intervalo de células'],
 c:1, exp:'O operador & concatena (une) textos no Excel. Ex: ="Olá "&A1 une o texto "Olá " com o conteúdo de A1. A função CONCATENAR() faz o mesmo de forma mais explícita.'},

{cat:'informatica', src:'INF',
 e:'(EXCEL) Qual é a extensão padrão dos arquivos do Microsoft Excel 2016?',
 a:['.xls',
    '.xlsx',
    '.csv',
    '.ods'],
 c:1, exp:'A partir do Excel 2007, o formato padrão é .xlsx (XML aberto). O formato .xls é legado (Excel 97-2003). O .csv é formato de texto separado por vírgulas, e .ods é formato LibreOffice.'},

{cat:'informatica', src:'INF',
 e:'(WORD) O atalho Ctrl+Z no Microsoft Word realiza qual operação?',
 a:['Salvar o documento',
    'Desfazer a última ação',
    'Selecionar tudo',
    'Fechar o documento'],
 c:1, exp:'Ctrl+Z desfaz a última ação realizada (Undo). Ctrl+Y refaz a ação desfeita (Redo). Este atalho funciona em praticamente todos os aplicativos Windows, não apenas no Word.'},

{cat:'informatica', src:'INF',
 e:'(WORD) Para inserir um CABEÇALHO ou RODAPÉ em um documento Word, deve-se ir à guia:',
 a:['Página Inicial',
    'Inserir',
    'Layout',
    'Referências'],
 c:1, exp:'Cabeçalhos e rodapés são inseridos pela guia Inserir > grupo Cabeçalho e Rodapé. Também é possível dar duplo clique na área superior/inferior da página para ativar a edição.'},

{cat:'informatica', src:'INF',
 e:'(WORD) A função de CONTROLE DE ALTERAÇÕES (Track Changes) no Word serve para:',
 a:['Controlar o número de palavras do documento',
    'Registrar todas as modificações feitas no documento, mostrando quem alterou o quê',
    'Verificar ortografia e gramática automaticamente',
    'Converter o documento para PDF'],
 c:1, exp:'O Controle de Alterações (Revisão > Controlar Alterações) registra todas as modificações feitas: inserções, exclusões e formatações, identificando o autor e data/hora. Essencial para revisão colaborativa de documentos.'},

{cat:'informatica', src:'INF',
 e:'(PowerPoint) Qual é a diferença entre LAYOUT e DESIGN de slide no PowerPoint?',
 a:['São sinônimos que representam a mesma função',
    'Layout define a disposição dos elementos no slide; Design define o tema visual (cores, fontes, fundos)',
    'Layout é o tema visual; Design é a disposição dos elementos',
    'Layout é exclusivo para slides de título; Design para demais slides'],
 c:1, exp:'Layout controla a organização/estrutura dos elementos (caixas de texto, imagens) no slide. Design (Tema) controla a aparência visual: cores, fontes, estilos de fundo e elementos decorativos.'},

{cat:'informatica', src:'INF',
 e:'(PowerPoint) Como se configura a DURAÇÃO de uma transição entre slides no PowerPoint?',
 a:['Guia Inserir > Animações > Duração',
    'Guia Transições > grupo Tempo > campo Duração',
    'Guia Design > Temporizador > Duração',
    'Guia Apresentação de Slides > Configurações > Duração'],
 c:1, exp:'A duração das transições é configurada em Transições > grupo Tempo > campo Duração (em segundos). Também é possível definir se o slide avança ao clicar ou automaticamente após determinado tempo.'},

{cat:'informatica', src:'INF',
 e:'(Windows) Qual atalho abre o Gerenciador de Tarefas diretamente no Windows 10?',
 a:['Ctrl+Alt+Del',
    'Ctrl+Shift+Esc',
    'Windows+T',
    'Alt+F4'],
 c:1, exp:'Ctrl+Shift+Esc abre o Gerenciador de Tarefas diretamente. Ctrl+Alt+Del abre a tela de segurança do Windows com várias opções, incluindo o Gerenciador de Tarefas como uma delas.'},

{cat:'informatica', src:'INF',
 e:'(Windows) O comando Ctrl+Alt+Del no Windows 10 abre:',
 a:['Diretamente o Gerenciador de Tarefas',
    'A tela de segurança do Windows com opções como Bloquear, Gerenciador de Tarefas e Sair',
    'O Painel de Controle',
    'O Explorador de Arquivos'],
 c:1, exp:'Ctrl+Alt+Del abre a tela de segurança do Windows, que oferece opções: Bloquear, Trocar usuário, Sair, Alterar senha e Gerenciador de Tarefas. Para abrir o GM diretamente, use Ctrl+Shift+Esc.'},

{cat:'informatica', src:'INF',
 e:'(Windows) No Windows Explorer, o atalho F2 serve para:',
 a:['Abrir o arquivo selecionado',
    'Renomear o arquivo ou pasta selecionado',
    'Criar uma nova pasta',
    'Excluir o arquivo selecionado'],
 c:1, exp:'F2 ativa o modo de renomeação do arquivo ou pasta selecionado no Windows Explorer, permitindo editar o nome diretamente sem abrir menus contextuais.'},

{cat:'informatica', src:'INF',
 e:'(Redes) O que significa o protocolo HTTPS?',
 a:['HyperText Transfer Protocol Secure – protocolo HTTP com camada de segurança SSL/TLS',
    'High Transfer Text Protocol System – protocolo de alta velocidade',
    'HyperText Transfer Protocol Simple – versão simplificada do HTTP',
    'Hybrid Transfer Technology Protocol Secure – protocolo híbrido'],
 c:0, exp:'HTTPS é o HTTP com criptografia SSL/TLS, que garante: autenticidade do site, confidencialidade dos dados transmitidos e integridade (dados não foram alterados). Identificado pelo cadeado na barra de endereço.'},

{cat:'informatica', src:'INF',
 e:'(E-commerce – Prova CEETEPS 2022) O modelo de comércio eletrônico B2B refere-se a:',
 a:['Transações entre empresa e consumidor final',
    'Transações comerciais entre duas empresas',
    'Transações entre consumidores por plataformas online',
    'Transações entre governo e empresas'],
 c:1, exp:'B2B (Business to Business) são transações comerciais entre empresas. B2C (Business to Consumer) é empresa para consumidor final. C2C (Consumer to Consumer) é entre consumidores, e G2B é governo para empresas.'},

{cat:'informatica', src:'INF',
 e:'(E-commerce – Prova CEETEPS 2022) CRM significa:',
 a:['Customer Relationship Management – Gestão de Relacionamento com o Cliente',
    'Customer Relationship Master – Mestre de Relacionamento',
    'Customer Relationship Mind – Mentalidade de Relacionamento',
    'Content Relationship Management – Gestão de Conteúdo'],
 c:0, exp:'CRM (Customer Relationship Management) é um sistema/estratégia para gerenciar o relacionamento com clientes, incluindo histórico de interações, preferências, atendimento e fidelização.'},

{cat:'informatica', src:'INF',
 e:'(BD – Prova CEETEPS 2022) Um conjunto de tabelas com permissão apenas de leitura que mantém informações sobre perfis, privilégios, índices e estrutura do banco de dados é denominado:',
 a:['Coleção',
    'Exibição de Leitura',
    'Dicionário de Dados',
    'Procedimento de Armazenamento'],
 c:2, exp:'O Dicionário de Dados (Data Dictionary / System Catalog) é um repositório de metadados que descreve a estrutura do banco: tabelas, colunas, tipos, restrições, índices, usuários e privilégios.'},

{cat:'informatica', src:'INF',
 e:'(S.O. – Prova CEETEPS 2022) Qual dos seguintes NÃO é um serviço típico do Sistema Operacional?',
 a:['Operações de entrada e saída (E/S)',
    'Execução de programas',
    'Criação de máquinas virtuais',
    'Manipulação do sistema de arquivos'],
 c:2, exp:'A criação de máquinas virtuais não é um serviço básico do SO — é uma funcionalidade de softwares especializados (hypervisors) como VMware ou VirtualBox. Os demais (E/S, execução de programas, sistema de arquivos) são serviços fundamentais do SO.'},

{cat:'pc', src:'PC',
 e:'(Pensamento Computacional) O que é ALGORITMIZAÇÃO no contexto do Pensamento Computacional?',
 a:['Processo de converter um algoritmo em linguagem binária',
    'Criação de uma sequência ordenada e finita de passos para resolver um problema',
    'Identificação de padrões em grandes volumes de dados',
    'Eliminação de detalhes irrelevantes de um problema'],
 c:1, exp:'Algoritmização é o processo de criar algoritmos: sequências ordenadas, finitas e sem ambiguidade de passos que resolvem um problema. É um dos quatro pilares do Pensamento Computacional.'},

{cat:'pc', src:'PC',
 e:'(Pensamento Computacional) Na lógica de programação, qual é a diferença entre um ALGORITMO e um PROGRAMA?',
 a:['Não há diferença — são sinônimos',
    'Algoritmo é a solução lógica do problema em linguagem informal; programa é a implementação em linguagem de programação específica',
    'Programa é mais genérico; algoritmo é específico para uma linguagem',
    'Algoritmo executa no computador; programa é apenas documentação'],
 c:1, exp:'O algoritmo descreve a lógica de solução de forma independente da linguagem (pseudocódigo, fluxograma). O programa é a implementação concreta em uma linguagem de programação específica (Python, Java, C, etc.).'},

{cat:'pc', src:'PC',
 e:'(Pensamento Computacional) Qual tipo de dado armazena valores como Verdadeiro/Falso em programação?',
 a:['Inteiro (int)',
    'Real (float)',
    'Booleano (bool)',
    'Caractere (char)'],
 c:2, exp:'O tipo booleano (bool) armazena apenas dois valores: verdadeiro (True) ou falso (False). É fundamental em estruturas de decisão e condições lógicas. O nome vem de George Boole, criador da álgebra booleana.'},

{cat:'pc', src:'PC',
 e:'(Pensamento Computacional) Em uma estrutura de repetição FOR com 5 iterações, quantas vezes o bloco interno é executado?',
 a:['4 vezes',
    '5 vezes',
    '6 vezes',
    'Depende da condição'],
 c:1, exp:'Em um FOR com 5 iterações bem definidas (ex: for i in range(5)), o bloco é executado exatamente 5 vezes (i=0,1,2,3,4). Diferente do WHILE, o FOR tem número de iterações geralmente previsível.'},

{cat:'pc', src:'PC',
 e:'(Pensamento Computacional) O que é um VETOR (array) em programação?',
 a:['Uma estrutura que armazena pares de chave-valor',
    'Uma coleção de variáveis do mesmo tipo, acessadas por índice numérico',
    'Uma função que retorna múltiplos valores',
    'Um tipo especial de variável booleana'],
 c:1, exp:'Um vetor (array) é uma estrutura de dados que armazena múltiplos elementos do mesmo tipo em posições consecutivas de memória, acessadas por índice (geralmente começando em 0). Ex: notas[0], notas[1], notas[2].'},

{cat:'pc', src:'PC',
 e:'(Pensamento Computacional) O que é DEPURAÇÃO (debugging) de código?',
 a:['Processo de escrever comentários no código',
    'Processo de identificar e corrigir erros (bugs) no programa',
    'Técnica de otimização de algoritmos para maior eficiência',
    'Processo de compilar o código para linguagem de máquina'],
 c:1, exp:'Depuração é o processo de localizar, identificar e corrigir erros (bugs) no código. Pode ser feita manualmente (analisando o código) ou com ferramentas específicas (debuggers) que permitem executar o código passo a passo.'},

{cat:'pc', src:'PC',
 e:'(Pensamento Computacional) Qual é a saída do pseudocódigo:\nI ← 1\nSOMA ← 0\nENQUANTO I ≤ 3 FAÇA\n  SOMA ← SOMA + I\n  I ← I + 1\nFIMENQUANTO\nESCREVA SOMA',
 a:['3',
    '6',
    '9',
    '12'],
 c:1, exp:'Iteração 1: SOMA=0+1=1, I=2. Iteração 2: SOMA=1+2=3, I=3. Iteração 3: SOMA=3+3=6, I=4. Condição I≤3 falsa → sai. ESCREVA 6.'},

{cat:'pc', src:'PC',
 e:'(Pensamento Computacional) O conceito de MODULARIZAÇÃO em programação refere-se a:',
 a:['Divisão do código em módulos/funções reutilizáveis e independentes',
    'Conversão do código para diferentes linguagens de programação',
    'Armazenamento de dados em módulos de memória',
    'Execução do programa em módulos paralelos'],
 c:0, exp:'Modularização divide o programa em funções/módulos menores, cada um com responsabilidade específica. Benefícios: reutilização de código, manutenção mais fácil, testabilidade individual e melhor organização.'},

{cat:'ia', src:'IA',
 e:'(IA) O que é APRENDIZADO POR REFORÇO (Reinforcement Learning)?',
 a:['Treinamento com dados rotulados por especialistas humanos',
    'Aprendizado onde um agente aprende por tentativa e erro, recebendo recompensas por ações corretas',
    'Identificação de padrões em dados sem supervisão',
    'Transferência de conhecimento entre modelos pré-treinados'],
 c:1, exp:'No aprendizado por reforço, um agente interage com um ambiente, toma ações e recebe recompensas (positivas ou negativas). Aprende a maximizar a recompensa acumulada. Usado em jogos (AlphaGo), robótica e controle de sistemas.'},

{cat:'ia', src:'IA',
 e:'(IA) O que são REDES NEURAIS CONVOLUCIONAIS (CNNs)?',
 a:['Redes neurais especializadas em processamento de sequências temporais',
    'Redes neurais com camadas convolucionais, especialmente eficientes para processamento de imagens',
    'Redes neurais para tradução automática de idiomas',
    'Redes neurais que funcionam sem treinamento supervisionado'],
 c:1, exp:'CNNs (Convolutional Neural Networks) usam operações de convolução para extrair características de imagens (bordas, texturas, formas). São a base do reconhecimento de imagens, detecção de objetos e diagnóstico médico por imagem.'},

{cat:'ia', src:'IA',
 e:'(IA) O que significa o termo "overfitting" (sobreajuste) em Machine Learning?',
 a:['O modelo é muito simples e não captura os padrões dos dados de treinamento',
    'O modelo memoriza os dados de treinamento mas generaliza mal para dados novos',
    'O modelo demora muito tempo para ser treinado',
    'O modelo usa mais memória do que o disponível no hardware'],
 c:1, exp:'Overfitting ocorre quando o modelo aprende tão bem os dados de treinamento (incluindo ruídos e exceções) que perde a capacidade de generalizar para dados novos. É combatido com regularização, mais dados e validação cruzada.'},

{cat:'ia', src:'IA',
 e:'(IA) O que é a BNCC (Base Nacional Comum Curricular) em relação à IA na educação?',
 a:['Proibição do uso de IA em escolas públicas',
    'Documento que inclui o Pensamento Computacional como competência a ser desenvolvida na Educação Básica',
    'Manual técnico para implementação de sistemas de IA nas escolas',
    'Protocolo de segurança para uso de dados de alunos em sistemas de IA'],
 c:1, exp:'A BNCC (2017/2018) incorporou o Pensamento Computacional como competência a ser desenvolvida na Educação Básica, reconhecendo a importância de habilidades computacionais e digitais para o século XXI.'},

{cat:'ia', src:'IA',
 e:'(IA) Qual das seguintes ferramentas é um exemplo de IA Generativa para criação de imagens?',
 a:['ChatGPT',
    'GitHub Copilot',
    'DALL-E / Midjourney',
    'Google Translate'],
 c:2, exp:'DALL-E (OpenAI) e Midjourney são ferramentas de IA Generativa que criam imagens a partir de descrições textuais (prompts). ChatGPT gera texto, GitHub Copilot gera código, Google Translate traduz textos.'},

{cat:'ia', src:'IA',
 e:'(IA) O que é o conceito de "Token" no contexto de modelos de linguagem?',
 a:['Unidade de segurança para autenticação em sistemas de IA',
    'Unidade básica de texto (pode ser uma palavra, parte de palavra ou pontuação) que o modelo processa',
    'Protocolo de comunicação entre diferentes modelos de IA',
    'Unidade de medida do tamanho do modelo em parâmetros'],
 c:1, exp:'Tokens são as unidades básicas de texto que LLMs processam. Uma palavra pode ser 1 token (simples) ou vários (complexas). O contexto de um modelo é medido em tokens — limitando quanto texto pode processar de uma vez.'},

{cat:'ia', src:'IA',
 e:'(IA) Qual é o principal risco da AUTOMAÇÃO pelo IA no mercado de trabalho?',
 a:['Aumento excessivo de vagas de emprego em todas as áreas',
    'Substituição de tarefas repetitivas e padronizadas, exigindo requalificação profissional',
    'Eliminação de toda necessidade humana no ambiente de trabalho',
    'Redução da produtividade das empresas pelo excesso de tecnologia'],
 c:1, exp:'A automação por IA tende a substituir tarefas rotineiras e padronizadas (tanto manuais quanto cognitivas), criando pressão por requalificação. Ao mesmo tempo, cria novas funções que exigem criatividade, empatia e habilidades digitais.'},

{cat:'ia', src:'IA',
 e:'(IA) O que significa "IA Responsável" (Responsible AI)?',
 a:['IA que funciona apenas sob supervisão de um operador humano em tempo real',
    'Conjunto de princípios e práticas para desenvolver e usar IA de forma ética, transparente, justa e segura',
    'IA com consumo de energia reduzido para menor impacto ambiental',
    'Sistema de IA que nunca comete erros em suas previsões'],
 c:1, exp:'IA Responsável envolve princípios como: transparência (explicabilidade das decisões), justiça (ausência de viés discriminatório), privacidade, segurança, confiabilidade e responsabilização humana sobre os sistemas de IA.'},

{cat:'lai', src:'LAI',
 e:'(LAI) Qual é o prazo máximo de restrição de acesso para informação classificada como ULTRASSECRETA?',
 a:['5 anos',
    '15 anos',
    '25 anos',
    '50 anos'],
 c:2, exp:'Pela Lei 12.527/2011: Reservada = 5 anos; Secreta = 15 anos; Ultrassecreta = 25 anos. Todos os prazos correm a partir da data de produção da informação.'},

{cat:'lai', src:'LAI',
 e:'(LAI) O princípio da PUBLICIDADE ATIVA estabelece que os órgãos públicos devem:',
 a:['Responder apenas às solicitações formais de informação',
    'Publicar proativamente informações de interesse geral, independentemente de solicitação',
    'Manter em sigilo informações estratégicas por padrão',
    'Divulgar apenas informações solicitadas por jornalistas credenciados'],
 c:1, exp:'Publicidade ativa é a obrigação do Estado de divulgar proativamente informações de interesse coletivo, sem necessidade de requerimento do cidadão. Exemplos: portais da transparência, publicação de gastos e contratos.'},

{cat:'lai', src:'LAI',
 e:'(LAI) O SIC (Serviço de Informações ao Cidadão) tem como função:',
 a:['Fiscalizar o cumprimento da LAI pelos órgãos públicos',
    'Receber e responder pedidos de acesso à informação dos cidadãos',
    'Classificar informações como sigilosas no interesse público',
    'Auditar os dados divulgados pelos órgãos públicos'],
 c:1, exp:'O SIC é o canal oficial para recebimento de pedidos de acesso à informação. Todo órgão público deve ter um SIC (físico e/ou virtual) que recebe, registra e encaminha as solicitações.'},

{cat:'lai', src:'LAI',
 e:'(LAI) Qual das situações a seguir NÃO justifica a restrição de acesso à informação?',
 a:['Informação que coloca em risco a segurança nacional',
    'Dados pessoais sensíveis de indivíduos identificáveis',
    'Informação sobre salário de servidor público',
    'Informação que pode comprometer investigação em curso'],
 c:2, exp:'Salários de servidores públicos são informações de transparência obrigatória, conforme a Constituição e a LAI. Devem ser divulgados mesmo sem solicitação específica. As demais situações podem justificar restrição.'},

{cat:'lai', src:'LAI',
 e:'(LAI) Se o pedido de acesso à informação for INDEFERIDO, o requerente pode apresentar recurso em qual prazo?',
 a:['5 dias',
    '10 dias',
    '15 dias',
    '30 dias'],
 c:1, exp:'O recurso contra decisão de indeferimento deve ser apresentado em até 10 dias a partir da ciência do indeferimento. O recurso é dirigido à autoridade hierarquicamente superior àquela que proferiu a decisão.'},

{cat:'legislacao', src:'LEG',
 e:'(LDB) Segundo a LDB (Lei 9.394/1996), a educação abrange:',
 a:['Apenas os processos de ensino formal em escolas credenciadas',
    'Os processos formativos que se desenvolvem na vida familiar, na convivência humana, no trabalho, nas instituições de ensino e pesquisa, nos movimentos sociais e nas manifestações culturais',
    'Exclusivamente a educação oferecida pelo Estado',
    'Apenas a formação para o trabalho e exercício da cidadania'],
 c:1, exp:'O art. 1º da LDB define educação de forma ampla: abrange todos os processos formativos — família, convivência, trabalho, escola, movimentos sociais, cultura. Não se limita à escolarização formal.'},

{cat:'legislacao', src:'LEG',
 e:'(LDB) De acordo com a LDB, é dever do Estado garantir:',
 a:['Apenas Educação Infantil e Ensino Fundamental obrigatórios',
    'Educação Básica obrigatória e gratuita dos 4 aos 17 anos',
    'Ensino Médio apenas para quem concluiu o Ensino Fundamental com aproveitamento mínimo',
    'Educação Superior gratuita a todos os brasileiros'],
 c:1, exp:'A EC 59/2009 tornou obrigatória a Educação Básica dos 4 aos 17 anos (Pré-escola, Ensino Fundamental e Ensino Médio). O Estado deve garantir acesso, permanência e qualidade nessa faixa etária.'},

{cat:'legislacao', src:'LEG',
 e:'(Resolução CNE/CP 1/2021) Segundo a Resolução CNE/CP nº 1/2021, o PROJETO PEDAGÓGICO DE CURSO (PPC) deve ser construído:',
 a:['Exclusivamente pela direção da escola, sem participação dos docentes',
    'Como instrumento de referência da comunidade escolar, com autonomia da instituição na sua concepção e revisão',
    'Seguindo um modelo único nacional, sem possibilidade de adaptação local',
    'Apenas para cursos de nível superior, não para cursos técnicos'],
 c:1, exp:'A Resolução CNE/CP 1/2021 garante autonomia às instituições para conceber, elaborar, executar, avaliar e revisar o PPC, construído como instrumento de referência de toda a comunidade escolar.'},

{cat:'legislacao', src:'LEG',
 e:'(Res. CNE/CEB 3/2018) As Diretrizes Curriculares Nacionais para o Ensino Médio (Resolução CNE/CEB 3/2018) organizam o currículo em:',
 a:['Apenas disciplinas tradicionais sem áreas de conhecimento',
    'Formação Geral Básica (BNCC) e Itinerários Formativos',
    'Exclusivamente formação técnica e profissional',
    'Núcleo comum nacional e parte diversificada estadual'],
 c:1, exp:'A Resolução CNE/CEB 3/2018, alinhada à Lei 13.415/2017, organiza o Ensino Médio em duas partes: a Formação Geral Básica (baseada na BNCC) e os Itinerários Formativos (escolha do estudante entre áreas ou formação técnica).'},

{cat:'legislacao', src:'LEG',
 e:'(Decreto 5.154/2004) Qual forma de articulação entre Ensino Médio e Educação Profissional permite que o estudante curse ambos simultaneamente em instituições DIFERENTES?',
 a:['Integrada',
    'Concomitante',
    'Subsequente',
    'Modular'],
 c:1, exp:'A forma CONCOMITANTE permite cursar EM e EP ao mesmo tempo em instituições diferentes (com matrículas separadas) ou na mesma instituição em turnos diferentes. INTEGRADA é na mesma instituição e currículo único. SUBSEQUENTE é após concluir o EM.'},

{cat:'legislacao', src:'LEG',
 e:'(LC 1.044/2008) O emprego público de Professor de Ensino Médio e Técnico do CEETEPS possui como característica:',
 a:['Contrato temporário renovável anualmente',
    'Contrato por prazo indeterminado após aprovação em concurso público',
    'Prestação de serviços como pessoa jurídica (PJ)',
    'Contrato por prazo determinado de 2 anos prorrogável'],
 c:1, exp:'O emprego público permanente no CEETEPS é preenchido por concurso público, gerando contrato por prazo indeterminado. A LC 1.044/2008 rege esse plano de carreiras, diferente do regime estatutário ou da CLT pura.'},

{cat:'legislacao', src:'LEG',
 e:'(Legislação) Qual lei federal proibiu o uso de celular por alunos durante as aulas no Brasil?',
 a:['Lei 13.415/2017',
    'Lei 14.831/2024 (ou legislação específica de proibição de celular)',
    'LDB 9.394/1996',
    'Lei 12.527/2011'],
 c:1, exp:'Em 2024, foi aprovada legislação federal proibindo o uso de celulares e dispositivos eletrônicos durante as aulas e intervalos nas escolas públicas e privadas, como medida para melhorar o ambiente de aprendizagem.'},

{cat:'legislacao', src:'LEG',
 e:'(Legislação) O ENEM (Exame Nacional do Ensino Médio) tem como uma de suas funções:',

    'Servir como instrumento de avaliação ao final do Ensino Médio e critério de acesso a programas como SISU, ProUni e FIES',
    'Avaliar exclusivamente alunos da rede pública de ensino',
    'Certificar professores do Ensino Médio em todo o Brasil'],

{cat:'adm', src:'Delib.87',
 e:'(Delib. 87/2022 – Regimento ETEC) O Regimento Comum das ETECs, instituído pela Deliberação 87/2022, rege:',
 a:['Apenas os cursos de graduação das FATECs','Todas as Escolas Técnicas Estaduais vinculadas ao Centro Paula Souza','Somente as ETECs da capital do estado de São Paulo','Apenas os cursos técnicos integrados ao Ensino Médio'],
 c:1, exp:'A Deliberação Ceeteps nº 87/2022 institui o Regimento Comum de todas as Escolas Técnicas Estaduais (ETECs) vinculadas ao Centro Paula Souza, regulando sua organização, funcionamento e normas pedagógicas e administrativas.'},

{cat:'adm', src:'Delib.87',
 e:'(Delib. 87/2022 – Regimento ETEC) Segundo o Regimento Comum das ETECs, o Diretor de Escola Técnica Estadual é:',
 a:['Eleito pelos professores e funcionários da unidade','Indicado pela Câmara Municipal do município sede','Nomeado pelo Governador do Estado mediante indicação do CEETEPS','Escolhido por concurso público específico para direção'],
 c:2, exp:'O Diretor de ETEC é nomeado pelo Governador do Estado, mediante indicação do CEETEPS, sendo responsável pela gestão pedagógica, administrativa e financeira da unidade escolar.'},

{cat:'adm', src:'Delib.87',
 e:'(Delib. 87/2022 – Regimento ETEC) De acordo com o Regimento Comum das ETECs, o Conselho de Escola tem como característica:',
 a:['Ser um órgão consultivo composto exclusivamente por professores','Ser o órgão máximo de natureza consultiva e deliberativa da unidade escolar, com representação de toda a comunidade escolar','Ter função apenas financeira, deliberando sobre o uso da verba da APM','Ser presidido pelo Secretário de Educação do Estado'],
 c:1, exp:'O Conselho de Escola é o órgão máximo de natureza consultiva e deliberativa da ETEC, presidido pelo Diretor, com representação de professores, funcionários, alunos e pais/responsáveis.'},

{cat:'adm', src:'Delib.87',
 e:'(Delib. 87/2022 – Regimento ETEC) Conforme o Regimento Comum das ETECs, o Conselho de Classe/Série tem como função principal:',
 a:['Deliberar sobre punições disciplinares de alunos','Analisar o desempenho coletivo e individual dos alunos e propor ações pedagógicas para melhoria da aprendizagem','Aprovar o calendário escolar anual da unidade','Fiscalizar as despesas da APM'],
 c:1, exp:'O Conselho de Classe/Série reúne professores e coordenadores para analisar o rendimento escolar dos alunos, identificar dificuldades e propor intervenções pedagógicas, sendo um instrumento coletivo de avaliação.'},

{cat:'adm', src:'Delib.87',
 e:'(Delib. 87/2022 – Regimento ETEC) No Regimento Comum das ETECs, o Projeto Político-Pedagógico (PPP) deve ser:',
 a:['Elaborado exclusivamente pela direção, sem participação dos docentes','Construído coletivamente pela comunidade escolar e aprovado pelo Conselho de Escola','Enviado ao MEC para aprovação antes de ser implementado','Revisado a cada 10 anos, independentemente de mudanças no contexto escolar'],
 c:1, exp:'O PPP é construído coletivamente com participação de professores, funcionários, alunos e comunidade, aprovado pelo Conselho de Escola. Expressa a identidade da escola, seus objetivos e a organização do trabalho pedagógico.'},

{cat:'adm', src:'Delib.87',
 e:'(Delib. 87/2022 – Regimento ETEC) Segundo o Regimento Comum das ETECs, em relação ao aproveitamento e recuperação de alunos:',
 a:['Não existe recuperação; o aluno reprovado deve reiniciar o curso do início','O aluno que não atingir a média tem direito a atividades/estudos de recuperação ao longo do processo','A recuperação só ocorre ao final do ano letivo, após a divulgação das notas finais','O professor decide individualmente se oferece ou não recuperação ao aluno'],
 c:1, exp:'O Regimento prevê recuperação contínua e paralela: o aluno que não atingir o desempenho esperado tem direito a atividades de recuperação ao longo do processo educativo, garantindo oportunidade de aprendizagem.'},

{cat:'adm', src:'Delib.87',
 e:'(Delib. 87/2022 – Regimento ETEC) Conforme o Regimento Comum das ETECs, a frequência mínima exigida do aluno para aprovação é de:',
 a:['70% do total de horas letivas','75% do total de horas letivas','80% do total de horas letivas','90% do total de horas letivas'],
 c:1, exp:'A frequência mínima exigida é de 75% do total de horas letivas de cada componente curricular. O aluno que não atingir esse percentual estará reprovado por falta, independentemente do desempenho acadêmico.'},

{cat:'adm', src:'Delib.87',
 e:'(Delib. 87/2022 – Regimento ETEC) De acordo com o Regimento Comum das ETECs, o estágio supervisionado nos cursos técnicos:',
 a:['É obrigatório em todos os cursos técnicos, independentemente da habilitação','É opcional e depende exclusivamente da vontade do aluno','Pode ser obrigatório ou não obrigatório, conforme previsto no plano de curso de cada habilitação','É proibido durante o período letivo regular'],
 c:2, exp:'O estágio pode ser obrigatório ou não obrigatório conforme o plano de curso de cada habilitação profissional técnica. Quando obrigatório, é requisito para obtenção do diploma.'},

{cat:'adm', src:'LC1044',
 e:'(LC 1.044/2008) A Lei Complementar nº 1.044/2008 institui, para os servidores do CEETEPS:',
 a:['O Estatuto dos Funcionários Públicos do Estado de São Paulo','O Plano de Carreiras, de Empregos Públicos e Sistema Retributório do CEETEPS','O Regimento Interno das ETECs e FATECs','O Código de Ética dos Professores da Rede Estadual Paulista'],
 c:1, exp:'A LC 1.044/2008 institui o Plano de Carreiras, de Empregos Públicos e Sistema Retributório dos servidores do CEETEPS, regulando o regime de emprego público, carreiras, jornadas e remuneração.'},

{cat:'adm', src:'LC1044',
 e:'(LC 1.044/2008) Segundo a LC 1.044/2008, o vínculo do Professor de Ensino Médio e Técnico do CEETEPS com a autarquia é:',
 a:['Estatutário, regido pela Lei 10.261/1968','Celetista puro, regido integralmente pela CLT','Emprego público, com contrato por prazo indeterminado após concurso público','Temporário, renovável a cada dois anos mediante avaliação de desempenho'],
 c:2, exp:'O CEETEPS adota o regime de emprego público: o servidor é admitido por concurso público e mantém contrato por prazo indeterminado, regime diferente do estatutário (servidor público) e do celetista privado comum.'},

{cat:'adm', src:'LC1044',
 e:'(LC 1.044/2008) A jornada de trabalho do Professor de Ensino Médio e Técnico do CEETEPS em regime de Dedicação Exclusiva (DE) é de:',
 a:['20 horas semanais','30 horas semanais','40 horas semanais','44 horas semanais'],
 c:2, exp:'A jornada em Dedicação Exclusiva (DE) é de 40 horas semanais, vedando ao servidor o exercício de outra atividade remunerada pública ou privada, salvo as exceções legais.'},

{cat:'adm', src:'LC1044',
 e:'(LC 1.044/2008) Conforme a LC 1.044/2008, o Professor de Ensino Médio e Técnico pode optar pela jornada de:',
 a:['Apenas 40 horas (DE)','12 ou 24 horas semanais','20 ou 40 horas semanais','8, 16 ou 32 horas semanais'],
 c:2, exp:'A LC 1.044/2008 prevê que o Professor de Ensino Médio e Técnico pode optar por jornadas de 20 horas (parcial) ou 40 horas semanais (Dedicação Exclusiva), conforme sua preferência e disponibilidade de vagas.'},

{cat:'adm', src:'LC1044',
 e:'(LC 1.044/2008) A progressão na carreira do Professor do CEETEPS ocorre mediante:',
 a:['Apenas por tempo de serviço, automaticamente a cada 2 anos','Exclusivamente por mérito, mediante aprovação em concurso interno','Por critérios de tempo de serviço e de mérito (avaliação de desempenho), conforme regulamentação','Por indicação do diretor da unidade escolar'],
 c:2, exp:'A progressão funcional no CEETEPS combina critérios de tempo de serviço (interstício mínimo) e de mérito (avaliação de desempenho), garantindo tanto a estabilidade funcional quanto o reconhecimento do desempenho.'},

{cat:'adm', src:'LC1044',
 e:'(LC 1.044/2008) Segundo a LC 1.044/2008, o estágio probatório do empregado público do CEETEPS tem duração de:',
 a:['6 meses','1 ano','3 anos','5 anos'],
 c:2, exp:'O estágio probatório dos empregados públicos do CEETEPS tem duração de 3 anos, durante os quais o servidor é avaliado quanto à sua aptidão, disciplina, assiduidade, responsabilidade e iniciativa.'},

{cat:'adm', src:'LC1044',
 e:'(LC 1.044/2008) De acordo com a LC 1.044/2008, a exoneração do empregado público do CEETEPS durante o estágio probatório pode ocorrer:',
 a:['Apenas por pedido do próprio empregado','Por reprovação na avaliação de desempenho do estágio probatório ou a pedido do empregado','Apenas por processo administrativo disciplinar com penalidade de demissão','Somente após decisão judicial transitada em julgado'],
 c:1, exp:'Durante o estágio probatório, o empregado pode ser exonerado por reprovação na avaliação de desempenho (interesse da administração) ou a pedido do próprio servidor. Fora do estágio, a dispensa sem justa causa requer processo específico.'},
