{cat:'legislacao', src:'LDB',
 e:'(LDB 9.394/1996 – Art. 22) A Educação Básica tem por finalidade:',
 a:['Preparar exclusivamente para o mercado de trabalho técnico','Desenvolver o educando, assegurar-lhe a formação comum indispensável para o exercício da cidadania e fornecer-lhe meios para progredir no trabalho e em estudos posteriores','Garantir apenas a alfabetização até os 8 anos de idade','Substituir a educação familiar na formação moral do indivíduo'],
 c:1, exp:'O Art. 22 da LDB define que a Educação Básica tem por finalidade desenvolver o educando, assegurar formação comum para a cidadania e fornecer meios para progredir no trabalho e em estudos posteriores – abrangendo Educação Infantil, Ensino Fundamental e Ensino Médio.'},

{cat:'legislacao', src:'LDB',
 e:'(LDB 9.394/1996 – Ensino Médio) Segundo a LDB, a duração mínima do Ensino Médio é de:',
 a:['2 anos','3 anos','4 anos','5 anos'],
 c:1, exp:'A LDB estabelece duração mínima de 3 anos para o Ensino Médio. Com a Lei 13.415/2017, a carga horária mínima foi ampliada progressivamente para 1.400 horas anuais ao final do prazo de implantação.'},

{cat:'legislacao', src:'LDB',
 e:'(LDB 9.394/1996 – Art. 35) São finalidades do Ensino Médio, EXCETO:',
 a:['A consolidação e o aprofundamento dos conhecimentos adquiridos no Ensino Fundamental','A preparação básica para o trabalho e a cidadania','A formação de técnicos especializados em nível superior','O aprimoramento do educando como pessoa humana, incluindo a formação ética e o desenvolvimento da autonomia intelectual'],
 c:2, exp:'O Art. 35 da LDB lista as finalidades do EM: consolidação do EF, preparação para trabalho/cidadania, aprimoramento como pessoa humana e compreensão dos fundamentos científico-tecnológicos. Formação de técnicos de nível superior não é finalidade do EM.'},

{cat:'legislacao', src:'LDB',
 e:'(LDB 9.394/1996 – Educação Profissional) A Educação Profissional Técnica de Nível Médio, conforme a LDB, pode ser desenvolvida de forma:',
 a:['Apenas integrada ao Ensino Médio, nunca de forma independente','Articulada (integrada ou concomitante) com o Ensino Médio ou subsequente a ele','Exclusivamente em instituições federais de ensino','Somente na modalidade a distância'],
 c:1, exp:'Conforme a LDB e o Decreto 5.154/2004, a Educação Profissional Técnica de Nível Médio pode ser desenvolvida de forma articulada com o EM (integrada ou concomitante) ou subsequente (após conclusão do EM).'},

{cat:'legislacao', src:'LDB',
 e:'(LDB 9.394/1996 – Capítulo III) A Educação Profissional e Tecnológica, no cumprimento dos objetivos da educação nacional, deve integrar-se:',
 a:['Exclusivamente aos diferentes níveis e modalidades de educação e às dimensões do trabalho, da ciência e da tecnologia','Somente ao Ensino Superior','Apenas ao Ensino Médio regular','Exclusivamente a programas de aprendizagem para jovens'],
 c:0, exp:'O Capítulo III da LDB dispõe que a Educação Profissional e Tecnológica deve integrar-se aos diferentes níveis e modalidades da educação e às dimensões do trabalho, da ciência e da tecnologia, abrangendo cursos de formação inicial, técnicos e tecnológicos.'},

{cat:'legislacao', src:'LDB',
 e:'(LDB 9.394/1996) O diploma de técnico de nível médio é conferido ao aluno que:',
 a:['Apenas conclui o Ensino Médio regular sem reprovação','Conclui o curso técnico e, quando exigido, o estágio supervisionado','Obtém aprovação em exame nacional de certificação técnica','Completa 1.800 horas de formação profissional, independentemente do Ensino Médio'],
 c:1, exp:'O diploma de técnico de nível médio é conferido ao aluno que concluir o curso técnico e, nos casos previstos no plano de curso, o estágio supervisionado obrigatório.'},

{cat:'legislacao', src:'LDB',
 e:'(LDB 9.394/1996) Segundo a LDB, a avaliação do rendimento escolar deve ser:',
 a:['Exclusivamente quantitativa, por meio de provas e testes padronizados','Contínua e cumulativa, com prevalência dos aspectos qualitativos sobre os quantitativos e dos resultados ao longo do período sobre os de eventuais provas finais','Realizada somente ao final de cada ano letivo, por meio de prova única','Feita exclusivamente pelo SAEB, sem autonomia da escola'],
 c:1, exp:'A LDB determina que a avaliação deve ser contínua e cumulativa, com prevalência dos aspectos qualitativos sobre os quantitativos e dos resultados ao longo do período sobre eventuais provas finais.'},

/* ══════════════════════════════════════════════════════
   BLOCO – LEI 13.415/2017 – REFORMA DO ENSINO MÉDIO
   ══════════════════════════════════════════════════════ */

{cat:'legislacao', src:'Lei13415',
 e:'(Lei 13.415/2017) A Lei 13.415/2017, que alterou a LDB, ficou conhecida como a lei da reforma do Ensino Médio. Uma de suas principais mudanças foi:',
 a:['A extinção do Ensino Médio de 3 anos, substituído por 2 anos','A criação dos Itinerários Formativos, que permitem ao estudante escolher áreas de aprofundamento','A obrigatoriedade de todas as disciplinas em todos os anos do EM','A extinção da Educação Profissional integrada ao EM'],
 c:1, exp:'A Lei 13.415/2017 criou os Itinerários Formativos – áreas de aprofundamento que o estudante pode escolher: Linguagens, Matemática, Ciências da Natureza, Ciências Humanas ou Formação Técnica e Profissional.'},

{cat:'legislacao', src:'Lei13415',
 e:'(Lei 13.415/2017) Conforme a reforma do Ensino Médio (Lei 13.415/2017), a carga horária mínima anual do EM deve ser ampliada progressivamente até atingir:',
 a:['800 horas anuais','1.000 horas anuais','1.400 horas anuais','2.000 horas anuais'],
 c:2, exp:'A Lei 13.415/2017 estabeleceu que a carga horária mínima anual do Ensino Médio deve ser ampliada progressivamente de 800 horas para 1.400 horas, com prazo de implementação definido pelo MEC.'},

{cat:'legislacao', src:'Lei13415',
 e:'(Lei 13.415/2017) A reforma do Ensino Médio determina que, para a formação técnica e profissional nos Itinerários Formativos, pode atuar como docente:',
 a:['Apenas licenciados com pós-graduação na área técnica','Profissionais com notório saber reconhecido pelos sistemas de ensino, mesmo sem licenciatura, para conteúdos técnicos e profissionais','Apenas servidores concursados da rede estadual de ensino','Exclusivamente profissionais com registro no CREA ou CRM'],
 c:1, exp:'A reforma admite profissional com notório saber – reconhecido pelos sistemas de ensino – para ministrar conteúdos de natureza técnica ou profissional nos Itinerários Formativos. Para a Formação Geral Básica (BNCC), exige-se licenciatura.'},

{cat:'legislacao', src:'Lei13415',
 e:'(Lei 13.415/2017) Os componentes curriculares obrigatórios nos três anos do Ensino Médio, segundo a reforma, são:',
 a:['Português, Matemática, História, Geografia e Ciências','Língua Portuguesa e Matemática (obrigatórios em todos os anos) e Língua Inglesa','Todos os componentes tradicionais do currículo sem alteração','Apenas Língua Portuguesa e Matemática, sendo os demais todos optativos'],
 c:1, exp:'A reforma define que Língua Portuguesa e Matemática são obrigatórios nos três anos do EM. A Língua Inglesa também é componente obrigatório. Os demais são organizados conforme a BNCC e os Itinerários Formativos.'},

{cat:'legislacao', src:'Lei13415',
 e:'(Lei 13.415/2017) Com relação ao Ensino Médio em tempo integral, a Lei 13.415/2017:',
 a:['Proibiu o ensino médio em tempo integral nas redes públicas','Fomentou a oferta de ensino médio em tempo integral, com jornada de pelo menos 7 horas diárias','Tornou o ensino médio em tempo integral obrigatório a partir de 2020','Limitou o tempo integral apenas a escolas técnicas federais'],
 c:1, exp:'A Lei 13.415/2017 fomentou a ampliação do ensino médio em tempo integral nas redes públicas (mínimo de 7 horas diárias), com políticas de incentivo financeiro aos estados que ampliassem a oferta.'},

/* ══════════════════════════════════════════════════════

{cat:'legislacao', src:'CNE-CP1-2021',
 e:'(Res. CNE/CP 1/2021) As DCN para a Educação Profissional e Tecnológica estabelecem que os cursos técnicos devem ser organizados por:',
 a:['Disciplinas isoladas sem relação com o perfil profissional de conclusão','Unidades curriculares articuladas ao perfil profissional de conclusão, garantindo a integração teoria-prática','Apenas aulas teóricas, sem componente prático','Grade curricular idêntica para todos os cursos técnicos do país'],
 c:1, exp:'A Resolução CNE/CP 1/2021 determina que os cursos de EP sejam organizados por unidades curriculares articuladas ao perfil profissional de conclusão, integrando teoria e prática, com foco nas competências para o exercício profissional.'},

{cat:'legislacao', src:'CNE-CP1-2021',
 e:'(Res. CNE/CP 1/2021) O Catálogo Nacional de Cursos Técnicos (CNCT) tem a função de:',
 a:['Proibir a criação de novos cursos técnicos no país','Referenciar a organização, a identidade e o itinerário formativo dos cursos técnicos, servindo de base para os sistemas de ensino','Definir os salários dos professores de cursos técnicos','Substituir o Projeto Pedagógico de Curso nas instituições'],
 c:1, exp:'O CNCT referencia a organização e identidade dos cursos técnicos, agrupando-os por eixos tecnológicos. Serve de base para os sistemas de ensino e instituições na elaboração dos planos de curso.'},

{cat:'legislacao', src:'CNE-CP1-2021',
 e:'(Res. CNE/CP 1/2021) Segundo as DCN para a EP, a avaliação da aprendizagem nos cursos técnicos deve ser:',
 a:['Exclusivamente somativa, com provas ao final de cada unidade','Processual, formativa e somativa, integrada ao desenvolvimento das competências do perfil profissional de conclusão','Realizada apenas por bancas externas à instituição','Baseada somente em portfólios, sem provas escritas'],
 c:1, exp:'As DCN/EP determinam que a avaliação seja processual (ao longo do processo), formativa (para orientar a aprendizagem) e somativa (para certificar competências), sempre articulada ao perfil profissional de conclusão.'},

/* ══════════════════════════════════════════════════════

{cat:'legislacao', src:'CNE-CEB3-2018',
 e:'(Res. CNE/CEB 3/2018 – DCNEM) As Diretrizes Curriculares para o EM organizam o currículo em quatro áreas do conhecimento. Qual das alternativas NÃO é uma dessas áreas?',
 a:['Linguagens e suas Tecnologias','Matemática e suas Tecnologias','Ciências da Natureza e suas Tecnologias','Filosofia e suas Tecnologias'],
 c:3, exp:'As quatro áreas são: Linguagens, Matemática, Ciências da Natureza e Ciências Humanas e Sociais Aplicadas. Filosofia não é uma área – é componente dentro de Ciências Humanas.'},

{cat:'legislacao', src:'CNE-CEB3-2018',
 e:'(Res. CNE/CEB 3/2018 – DCNEM) Segundo as DCNEM, o projeto de vida do estudante deve:',
 a:['Ser ignorado no currículo, pois a escola foca em conteúdos disciplinares','Ser considerado na organização curricular, integrando as dimensões pessoal, cidadã e profissional','Substituir todas as disciplinas obrigatórias do Ensino Médio','Ser elaborado exclusivamente pelo orientador educacional'],
 c:1, exp:'As DCNEM valorizam o projeto de vida do estudante como princípio organizador do currículo, integrando dimensões pessoal (autoconhecimento), cidadã (participação social) e profissional (mundo do trabalho).'},

{cat:'legislacao', src:'CNE-CEB3-2018',

/* ───── MOTOR DO SIMULADO ───── */
let acertos = 0, respondidas = 0;
const total = Q.length;
let catAtiva = 'todas';

function render() {
  const main = document.getElementById('main');
  // limpa mantendo stats-bar
  const sb = document.getElementById('stats-bar');
  main.innerHTML = '';
  main.appendChild(sb);

  Q.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'questao';
    div.style.display=(catAtiva==='todas'||catAtiva===q.cat)?'block':'none';
    div.id = 'q'+i;

    const cats = {informatica:'🖥️ Informática',pc:'🧠 Pens. Computacional',ia:'🤖 Int. Artificial',legislacao:'📜 Legislação',adm:'🏛️ Adm. Pública',lai:'🔓 Lei Acesso à Info.'};
    const srcBadge = q.src==='real' ? '<span class="badge-real">⭐ Prova Real</span>' : '';

    div.innerHTML = `
      <div class="qh">
        <div class="num">${i+1}</div>
        <span class="tag">${cats[q.cat]}</span>
        ${srcBadge}
      </div>
      <p class="enunciado">${q.e}</p>
      <ul class="alternativas">
        ${q.a.map((alt,j)=>`<li><label id="L${i}_${j}"><input type="radio" name="rq${i}" value="${j}"> ${String.fromCharCode(65+j)}) ${alt}</label></li>`).join('')}
      </ul>
      <button class="btn-conf" onclick="conf(${i})">Confirmar resposta</button>
      <div class="feedback" id="fb${i}"></div>
    `;
    main.appendChild(div);
  });
  updStats();
}

function conf(i) {
  const sel = document.querySelector(`input[name="rq${i}"]:checked`);
  if (!sel) { alert('Selecione uma alternativa.'); return; }
  const val = parseInt(sel.value);
  const q = Q[i];
  const fb = document.getElementById('fb'+i);
  const btn = document.querySelector(`#q${i} .btn-conf`);

  document.querySelectorAll(`input[name="rq${i}"]`).forEach(r=>r.disabled=true);
  btn.disabled = true;

  q.a.forEach((_,j)=>{
    const lbl = document.getElementById(`L${i}_${j}`);
    if(j===q.c) lbl.classList.add('correta');
    else if(j===val&&val!==q.c) lbl.classList.add('errada');
  });

  if(val===q.c){ acertos++; fb.className='feedback ok'; fb.innerHTML='✅ <strong>Correto!</strong> '+q.exp; }
  else { fb.className='feedback err'; fb.innerHTML='❌ <strong>Incorreto.</strong> '+q.exp; }
  fb.style.display='block';
  respondidas++;
  updStats();
  updBarra();
  var visCount=0,ansCount=0;
  for(var k=0;k<Q.length;k++){var el=document.getElementById('q'+k);if(el&&el.style.display!=='none'){visCount++;var bt=el.querySelector('button');if(bt&&bt.disabled)ansCount++;}}
  if(ansCount>0&&ansCount===visCount) showResult();
}

function updStats() {
  const pct = respondidas>0?Math.round(acertos/respondidas*100):0;
  document.getElementById('s-resp').textContent = respondidas;
  document.getElementById('s-ac').textContent = acertos;
  document.getElementById('s-pct').textContent = pct+'%';
  document.getElementById('ac-f').textContent = acertos;
  document.getElementById('re-f').textContent = respondidas;
}

function updBarra() {
  document.getElementById('barra-fill').style.width=(respondidas/total*100)+'%';
}

function showResult() {
  const r = document.getElementById('resultado');
  r.style.display='block';
  const pct = Math.round(acertos/total*100);
  document.getElementById('pf').textContent = acertos+' / '+total+' ('+pct+'%)';
  const msg = pct>=70?'🎉 Excelente! Você está bem preparado(a) para a prova.':pct>=50?'📖 Bom progresso! Revise os temas em que errou.':'💡 Continue estudando! Foque nas categorias com mais erros.';
  document.getElementById('msg-r').textContent = msg;
  r.scrollIntoView({behavior:'smooth'});
}

function filtrar(cat, btn) {
  catAtiva = cat;
  document.querySelectorAll('.aba').forEach(a=>a.classList.remove('ativo'));
  btn.classList.add('ativo');
  for(var i=0;i<Q.length;i++){
    var el=document.getElementById('q'+i);
    if(!el)continue;
    var show=(cat==='todas'||Q[i].cat===cat);
    el.style.display=show?'block':'none';
  }
  const vis = cat==='todas'?total:Q.filter(q=>q.cat===cat).length;
  document.getElementById('s-total').textContent = vis;
  document.getElementById('main').scrollIntoView({behavior:'smooth'});
}

function reiniciar() {
  acertos=0; respondidas=0;
  document.getElementById('resultado').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
